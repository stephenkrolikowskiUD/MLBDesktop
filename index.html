<!DOCTYPE html>
<!-- Baseline: 2026-05-04 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>MLB DFS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap');
:root {
  --surface-0: #0c2318;
  --surface-1: #12281c;
  --surface-2: #183324;
  --surface-3: #234533;
  --border-1: #274a37;
  --border-2: #3a6b52;
  --ink-0: #f4f1ea;
  --ink-1: #d9d4c7;
  --ink-muted: #7a8b7f;
  --ink-quiet: #4a5b52;
  --accent: #5ba97a;
  --accent-soft: #7dbb98;
  --accent-bg: #1a3d2a;
  --accent-line: #274a37;
  --over: #4a9b5f;
  --over-soft: #4a9b5f22;
  --over-line: #4a9b5f44;
  --under: #c94a4a;
  --under-soft: #c94a4a22;
  --under-line: #c94a4a44;
  --push: #9a9a8f;
  --smash: #4a9b5f;
  --strong: #3d7db3;
  --lean: #b8813a;
  --warn: #c89452;
  --warn-soft: #c8945222;
  --warn-line: #c8945244;
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --r-sm: 6px;
  --r-md: 10px;
  --r-pill: 999px;
  --t-xs: 11px;
  --t-sm: 13px;
  --t-md: 15px;
  --t-lg: 22px;
  --dur-fast: 120ms;
  --dur-med: 180ms;
  --ease: cubic-bezier(0.2, 0.6, 0.2, 1);
}
body.light-theme {
  --surface-0: #f6fbf7;
  --surface-1: #ffffff;
  --surface-2: #eaf3ec;
  --surface-3: #d8e7db;
  --border-1: #c7d9cc;
  --border-2: #94a3b8;
  --ink-0: #0f1a13;
  --ink-1: #2a3b31;
  --ink-muted: #64766a;
  --ink-quiet: #94a3b8;
  --accent: #2f7548;
  --accent-soft: #4a9b5f;
  --accent-bg: #e6f0e9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--surface-0);color:var(--ink-0);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:var(--t-sm);line-height:1.4;max-width:480px;margin:0 auto;padding-bottom:60px}
.stat-val,.avg-val,.draft-fp-val,.streak-count,.due-score,.dinger-rate,.bet-edge,.slip-score,.ps-val,.bs-val,.matchup-stat .val,.stat-box .val,.prop-line,.pick-lean{font-family:"Barlow Condensed",system-ui,sans-serif;font-weight:800;letter-spacing:.01em;font-variant-numeric:tabular-nums}
td,th,.bar-val,.mini-bar-val,.prop-odds,.prop-line,.hit-val,.weather-val,.stat-val,.avg-val,.pick-line,.timestamp,.draft-fp-val,.streak-count,.due-score,.dinger-rate,.bet-edge{font-variant-numeric:tabular-nums}
.icon-inline{display:inline-flex;vertical-align:-2px;margin-right:6px;color:currentColor}
button,.mode-btn,.pf-btn,.sub-tab{font-family:inherit}
select,input{background:var(--surface-2);color:var(--ink-0);border:1px solid var(--border-1);border-radius:8px;padding:8px 10px;font-size:var(--t-md);width:100%}
input::placeholder{color:var(--ink-muted)}
.header{background:var(--surface-1);padding:12px 16px;border-bottom:1px solid var(--border-1);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.header-title{color:var(--accent);font-weight:700;font-size:var(--t-md);font-family:"Barlow Condensed",system-ui,sans-serif;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.refresh-btn{background:var(--surface-2);border:1px solid var(--border-1);color:var(--ink-1);border-radius:8px;padding:6px 10px;font-size:var(--t-xs);font-weight:700;cursor:pointer;transition:var(--dur-med)}
.refresh-btn:hover{background:var(--surface-3)}
.theme-btn{background:var(--surface-2);border:1px solid var(--border-1);color:var(--ink-1);border-radius:8px;padding:6px 10px;font-size:var(--t-xs);font-weight:700;cursor:pointer;transition:var(--dur-med)}
.theme-btn:hover{background:var(--surface-3)}
.player-link{color:inherit;text-decoration:underline dotted rgba(255,255,255,.35);cursor:pointer}
.player-link:hover{opacity:.85}
.risk-badge{display:inline-block;font-size:var(--t-xs);font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px}
.risk-returning{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-line)}
.risk-limited{background:color-mix(in srgb, var(--ink-muted) 13%, transparent);color:var(--ink-1);border:1px solid color-mix(in srgb, var(--ink-muted) 27%, transparent)}
.risk-subnote{font-size:var(--t-xs);color:var(--warn);margin-top:4px;font-weight:600}
.muted-risk{opacity:.55}
.props-returning td{opacity:.6}
.locked-badge{display:inline-block;font-size:var(--t-xs);font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px;background:#47556922;color:var(--ink-1);border:1px solid color-mix(in srgb, var(--ink-muted) 33%, transparent)}
.locked-card{opacity:.5;filter:saturate(.7)}
.props-locked td{opacity:.45}
.row{display:flex;gap:8px;margin-top:8px}
.row select,.row input{flex:1}
.section{padding:14px 16px 0}
.label{color:var(--accent-soft);font-size:var(--t-xs);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card{background:var(--surface-1);border-radius:10px;padding:12px 14px}
.card-title{color:var(--accent);font-weight:700;font-size:var(--t-sm);margin-bottom:8px}
.stats-strip{background:var(--surface-1);padding:10px 16px;border-bottom:1px solid var(--surface-2);overflow-x:auto}
.stats-strip-inner{display:flex;gap:16px;min-width:max-content}
.stat-item{text-align:center;min-width:40px}
.stat-label{color:var(--accent-soft);font-size:var(--t-xs);margin-bottom:2px;font-weight:600}
.stat-val{color:var(--accent);font-weight:700;font-size:var(--t-sm)}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-val{font-size:var(--t-xs);color:var(--ink-1);margin-bottom:1px;font-weight:600}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s,background .3s}
.bar-date{font-size:var(--t-xs);color:var(--accent-soft);margin-top:2px}
.line-indicator{border-top:1px dashed var(--accent);margin-top:2px;padding-top:2px;font-size:var(--t-xs);color:var(--accent)}
.avg-cards{display:flex;gap:8px}
.avg-card{flex:1;background:var(--surface-1);border-radius:8px;padding:10px 4px;text-align:center}
.avg-label{color:var(--accent-soft);font-size:var(--t-xs);margin-bottom:4px}
.avg-val{font-weight:700;font-size:var(--t-md)}
.split-row{display:flex;gap:8px}
.split-card{flex:1;background:var(--surface-1);border-radius:10px;padding:12px}
.split-title{color:var(--ink-1);font-size:var(--t-xs);font-weight:600;margin-bottom:8px;display:block}
.mini-bars-container{position:relative;height:70px;display:flex;gap:6px;align-items:flex-end}
.mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.mini-bar{width:100%;border-radius:3px 3px 0 0;flex-shrink:0}
.mini-bar-label{font-size:var(--t-xs);color:var(--accent-soft);margin-top:2px}
.mini-bar-val{font-size:var(--t-xs);color:var(--ink-0);font-weight:600;margin-top:1px}
.matchup-card{background:var(--surface-1);border-radius:10px;padding:12px 14px}
.matchup-header{color:var(--accent);font-weight:700;font-size:var(--t-md);margin-bottom:6px}
.matchup-sub{color:var(--accent-soft);font-size:var(--t-xs);margin-bottom:8px}
.matchup-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.matchup-stat{text-align:center}
.matchup-stat .val{font-weight:700;font-size:var(--t-md);color:var(--ink-0)}
.matchup-stat .lbl{font-size:var(--t-xs);color:var(--accent-soft)}
.weather-card{background:var(--surface-1);border-radius:10px;padding:12px 14px}
.weather-row{display:flex;justify-content:space-between;margin-bottom:4px}
.weather-key{color:var(--accent-soft);font-size:var(--t-sm)}
.weather-val{color:var(--ink-0);font-size:var(--t-sm);font-weight:600}
.hit-row{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--border-1)}
.hit-key{color:var(--accent-soft);font-size:var(--t-sm)}
.hit-val{color:var(--ink-0);font-size:var(--t-sm);font-weight:600}
.timestamp{text-align:center;padding:16px;color:var(--ink-quiet);font-size:var(--t-xs)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.skeleton-page{padding:var(--s-4);display:flex;flex-direction:column;gap:var(--s-3)}
.skeleton-row{background:var(--surface-1);border-radius:var(--r-md);overflow:hidden;position:relative}
.skeleton-row.h-header{height:48px}
.skeleton-row.h-strip{height:64px}
.skeleton-row.h-card{height:96px}
@media (prefers-reduced-motion:no-preference){
  .skeleton-row::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.03) 50%,transparent 100%);animation:sk-shimmer 1.4s ease-in-out infinite}
  @keyframes sk-shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
}
.error{padding:24px;color:var(--under);font-size:var(--t-md)}
.no-data{color:var(--ink-muted);font-size:var(--t-xs)}
body.light-theme .bet-card,body.light-theme .pick-card,body.light-theme .slip-card,body.light-theme .streak-card,body.light-theme .draft-card,body.light-theme .due-card,.light-theme .combo-card,.light-theme .prop-card{background:var(--surface-1);box-shadow:0 1px 2px rgba(15,23,42,.06)}
body.light-theme .tab-bar{border-top-color:#d8e7db}
body.light-theme .props-returning td,body.light-theme .muted-risk{opacity:.6}
.tab-bar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface-1);border-top:1px solid var(--border-1);display:flex;z-index:20}
.tab-btn{flex:1;padding:10px 4px;text-align:center;font-size:var(--t-xs);font-weight:600;color:var(--ink-muted);cursor:pointer;border:none;background:none}
.tab-btn.active{color:var(--accent);border-top:2px solid var(--accent)}
.page{display:none}
.page.active{display:block}
.log-intro{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:18px 16px 12px;background:linear-gradient(135deg,var(--surface-1),var(--surface-0));border-bottom:1px solid var(--border-1)}
.log-kicker{color:var(--accent);font-size:var(--t-xs);font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.log-heading{font-family:"Barlow Condensed",system-ui,sans-serif;color:var(--ink-0);font-size:var(--t-lg);font-weight:800;line-height:1;margin-top:3px}
.log-context{color:var(--ink-muted);font-size:var(--t-xs);margin-top:5px}
.log-stat-chip{display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding:7px 10px;border:1px solid var(--accent-line);border-radius:var(--r-md);background:var(--accent-bg);color:var(--accent-soft);font-size:var(--t-xs);font-weight:800;white-space:nowrap}
.log-stat-chip strong{font-family:"Barlow Condensed",system-ui,sans-serif;color:var(--ink-0);font-size:var(--t-md);line-height:1}
.log-controls{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-1);background:var(--surface-0)}
.log-controls label{color:var(--ink-muted);font-size:var(--t-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.log-controls select{width:auto;min-width:180px;padding:7px 10px;font-size:var(--t-sm)}
.log-table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);padding:0 16px 80px}
table{width:100%;border-collapse:collapse;font-size:var(--t-xs);min-width:360px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--surface-1);color:var(--accent);font-weight:800;padding:9px 6px;text-align:center;border-bottom:1px solid var(--border-1);white-space:nowrap;letter-spacing:.04em}
th.hl{background:var(--accent-bg);color:var(--accent-soft);box-shadow:inset 1px 0 var(--accent-line),inset -1px 0 var(--accent-line)}
td{padding:8px 6px;text-align:center;color:var(--ink-1);border-bottom:1px solid var(--surface-2);white-space:nowrap;transition:background var(--dur-fast)}
tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--surface-1) 55%,transparent)}
tbody tr:hover td{background:var(--surface-2)}
td.hl{background:var(--accent-bg);color:var(--accent-soft);font-weight:800;box-shadow:inset 1px 0 var(--accent-line),inset -1px 0 var(--accent-line)}
tbody tr:nth-child(even) td.hl{background:color-mix(in srgb,var(--accent-bg) 82%,var(--surface-1))}
tbody tr:hover td.hl{background:var(--accent-bg)}
td.hit{color:var(--over);font-weight:700}
td.miss{color:var(--under);font-weight:700}
td.push{color:var(--push);font-weight:700}
.early-banner{background:var(--surface-2);border:1px solid var(--border-1);border-radius:10px;padding:14px;margin:14px 16px 0;text-align:center}
.early-banner .msg{color:var(--accent-soft);font-size:var(--t-sm);font-weight:600}
.early-banner .sub{color:var(--ink-muted);font-size:var(--t-xs);margin-top:4px}
.prop-card{background:var(--surface-1);border:1px solid var(--border-1);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.prop-left{display:flex;align-items:center;gap:10px}
.prop-metric{background:var(--surface-2);border:1px solid var(--border-1);border-radius:6px;padding:4px 8px;font-size:var(--t-xs);font-weight:700;color:var(--accent);min-width:32px;text-align:center}
.prop-line{font-size:var(--t-md);font-weight:700;color:var(--ink-0)}
.prop-right{text-align:right}
.prop-odds{font-size:var(--t-xs);font-weight:600}
.prop-over{color:var(--over)}
.prop-under{color:var(--under)}
.pick-card{background:var(--surface-1);border-radius:10px;padding:12px 14px;margin:0 16px 10px;border-left:3px solid var(--border-1);transition:transform var(--dur-fast),box-shadow var(--dur-fast)}
.pick-card.smash{border-left-color:var(--over);background:#16302a}
.pick-card.strong{border-left-color:var(--strong)}
.pick-rank{display:inline-block;background:var(--surface-2);color:var(--accent);font-size:var(--t-xs);font-weight:700;padding:2px 6px;border-radius:4px;margin-right:6px}
.pick-player{font-weight:700;font-size:var(--t-md)}
.pick-matchup{color:var(--accent-soft);font-size:var(--t-xs);margin-top:2px}
.pick-prop{display:flex;align-items:center;gap:8px;margin-top:8px}
.pick-type{background:var(--surface-2);border:1px solid var(--border-1);border-radius:6px;padding:3px 8px;font-size:var(--t-xs);font-weight:700;color:var(--accent)}
.pick-lean{font-size:var(--t-md);font-weight:700}
.pick-lean.over{color:var(--over)}
.pick-lean.under{color:var(--under)}
.pick-conf{font-size:var(--t-xs);font-weight:700;padding:3px 8px;border-radius:10px;margin-left:auto}
.pick-conf.smash{background:var(--over-soft);color:var(--over);border:1px solid var(--over-line)}
.pick-conf.strong{background:color-mix(in srgb, var(--strong) 13%, transparent);color:var(--strong);border:1px solid color-mix(in srgb, var(--strong) 27%, transparent)}
.pick-conf.lean{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-line)}
.pick-rationale{color:var(--push);font-size:var(--t-xs);margin-top:6px;font-style:italic} .pick-card.lineup-risk{border-left-color:var(--warn);background:#2a2418} .pick-card.lineup-risk.smash{border-left-color:var(--warn);background:#2a2418} .pick-card.lineup-risk.strong{border-left-color:var(--warn);background:#2a2418} .lineup-risk-badge{display:inline-block;background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-line);font-size:var(--t-xs);font-weight:700;padding:3px 8px;border-radius:6px;margin-top:6px} .lineup-risk-text{color:var(--warn);font-size:var(--t-xs);margin-top:4px;font-weight:600}
.pick-result{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border-1)}
.result-badge{font-size:var(--t-xs);font-weight:700;padding:2px 8px;border-radius:10px}
.result-hit{background:var(--over-soft);color:var(--over);border:1px solid var(--over-line)}
.result-miss{background:var(--under-soft);color:var(--under);border:1px solid var(--under-line)}
.result-push{background:color-mix(in srgb, var(--push) 13%, transparent);color:var(--push);border:1px solid color-mix(in srgb, var(--push) 27%, transparent)}
.result-actual{color:var(--accent-soft);font-size:var(--t-xs)}
.props-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
.pf-btn{padding:6px 12px;font-size:var(--t-xs);font-weight:600;color:var(--ink-muted);background:var(--surface-2);border:1px solid var(--border-1);border-radius:16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pf-btn.active{color:var(--accent);background:var(--surface-3);border-color:var(--accent)}
.props-tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:50vh;padding:0 16px 16px}
.props-tbl-wrap table{min-width:420px}
.odds-over{color:var(--over);font-weight:600}
.odds-under{color:var(--under);font-weight:600}
.odds-even{color:var(--warn);font-weight:600}
.search-wrap{position:relative}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface-2);border:1px solid var(--border-1);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:20;display:none}
.sug-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--surface-3);font-size:var(--t-sm)}
.sug-item:hover,.sug-item:active{background:var(--surface-3)}
.sug-name{font-weight:600;color:var(--ink-0)}
.sug-meta{color:var(--ink-muted);font-size:var(--t-xs);margin-top:2px}
.profile{display:flex;align-items:center;gap:14px;padding:14px 16px}
.profile-info h2{font-size:var(--t-lg);font-weight:700}
.profile-info p{font-size:var(--t-sm);color:var(--accent-soft);margin-top:2px}
.profile-img{width:64px;height:64px;border-radius:50%;background:var(--surface-2);overflow:hidden}
.profile-img img{width:100%;height:100%}
.sub-tabs{display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.sub-tab{padding:8px 14px;font-size:var(--t-sm);font-weight:600;color:var(--ink-muted);background:var(--surface-2);border:1px solid var(--border-1);border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-tab.active{color:var(--accent);background:var(--surface-3);border-color:var(--accent)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 16px 8px}
.stat-box{background:var(--surface-2);border-radius:8px;padding:8px 4px;text-align:center}
.stat-box .val{font-weight:700;font-size:var(--t-md);color:var(--accent)}
.stat-box .lbl{font-size:var(--t-xs);color:var(--accent-soft);margin-top:2px}
.lk-tbl-wrap{overflow-x:auto;padding:0 16px 16px}
.lk-section{padding:14px 16px 0}
.empty{color:var(--ink-muted);font-size:var(--t-sm);padding:20px;text-align:center}
.loading-sm{color:var(--ink-muted);font-size:var(--t-sm);padding:20px;text-align:center}
.picks-summary{display:flex;gap:8px;padding:0 16px 8px}
.ps-card{flex:1;background:var(--surface-1);border-radius:8px;padding:10px;text-align:center}
.ps-val{font-size:var(--t-lg);font-weight:800;color:var(--accent)}
.ps-lbl{font-size:var(--t-xs);color:var(--accent-soft);margin-top:2px}
.dinger-card{background:var(--surface-1);border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid var(--warn);display:flex;align-items:center;justify-content:space-between;transition:transform var(--dur-fast),box-shadow var(--dur-fast)}
.dinger-card.top3{border-left-color:var(--under);background:#1a2024}
.dinger-left{flex:1}
.dinger-rank{display:inline-block;background:var(--surface-2);color:var(--warn);font-size:var(--t-xs);font-weight:800;padding:2px 6px;border-radius:4px;margin-right:6px;min-width:20px;text-align:center}

let derived={

function resetDerived(){
  derived={
    version:-1,
    batterLogsByName:new Map(),
    pitcherLogsByName:new Map(),
    propsByName:new Map(),
    tonightByName:new Map(),

function indexRowsByName(rows,nameKey){
  const map=new Map();
  for(const row of rows||[]){
    const key=normalizePlayerName(row?.[nameKey]);
    if(!key)continue;
    if(!map.has(key))map.set(key,[]);
    map.get(key).push(row);
  }
  return map;
}

function ensureDerived(){
  if(derived.version===st.dataVersion)return;
  resetDerived();
  derived.version=st.dataVersion;
  derived.batterLogsByName=indexRowsByName(st.gameLogs,"player_name");
  derived.pitcherLogsByName=indexRowsByName(st.pGameLogs,"player_name");
  for(const logs of derived.batterLogsByName.values())logs.sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
  for(const logs of derived.pitcherLogsByName.values())logs.sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
  derived.propsByName=indexRowsByName(st.props,"PLAYER_NAME");
  for(const row of st.tonight||[]){
    const key=normalizePlayerName(row?.player_name);
    if(key&&!derived.tonightByName.has(key))derived.tonightByName.set(key,row);
  }
  for(const row of st.pTonight||[]){
    const key=normalizePlayerName(row?.player_name);
    if(key&&!derived.pTonightByName.has(key))derived.pTonightByName.set(key,row);
  }
  const allDates=[...new Set((st.picks||[]).map(p=>normalizeDate(rowField(p,"DATE"))).filter(Boolean))].sort();
  derived.latestPickDate=allDates.length?allDates[allDates.length-1]:"";
  const sameDatePicks=(st.picks||[]).filter(p=>normalizeDate(rowField(p,"DATE"))===derived.latestPickDate);
  derived.latestPickRun=sameDatePicks.length?Math.max(...sameDatePicks.map(p=>toNum(rowField(p,"RUN_NUMBER")))):0;
  for(const p of st.picks||[]){
    const key=normalizePlayerName(p?.player);
    if(!key)continue;
    if(normalizeDate(rowField(p,"DATE"))===derived.latestPickDate && toNum(rowField(p,"RUN_NUMBER"))===derived.latestPickRun && !derived.picksByNameLatest.has(key)){
      derived.picksByNameLatest.set(key,p);
    }
  }
}

function getMemo(key,build){

}

function cleanRows(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const ck=k.replace(/^\uFEFF/,'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
      clean[ck]=v;
    }
    return clean;
  });
}

function normalizeKeys(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const trimmed=String(k||'')
        .replace(/^\uFEFF/,'')
        .replace(/[\u200B-\u200D\uFEFF]/g,'')
        .trim();
      clean[trimmed]=v;
    }
    return clean;
  });
}

function canonicalFieldKey(key){
  return String(key||"")
    .replace(/^\uFEFF/,'')
    .replace(/[\u200B-\u200D\uFEFF]/g,'')
    .trim()
    .replace(/([a-z0-9])([A-Z])/g,'$1_$2')
    .replace(/[^A-Za-z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'')
    .toLowerCase();
}

function rowField(row,...names){
  if(!row)return "";
  for(const name of names){
    if(Object.prototype.hasOwnProperty.call(row,name))return row[name];
  }
  const lookup={};
  for(const [key,value] of Object.entries(row)){
    const ck=canonicalFieldKey(key);
    if(ck&&!Object.prototype.hasOwnProperty.call(lookup,ck))lookup[ck]=value;
  }
  for(const name of names){
    const ck=canonicalFieldKey(name);
    if(Object.prototype.hasOwnProperty.call(lookup,ck))return lookup[ck];
  }
  return "";
}

function fetchSheet(name,attempt=1){
  return new Promise((res,rej)=>{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${encodeURIComponent(name)}&cacheBust=${Date.now()}_${attempt}`;
    fetch(url,{cache:"no-store"})
    .then(r=>{
      if(!r.ok){console.error(`❌ Sheet fetch failed: ${name} (${r.status})`);throw new Error(`Failed: ${name} (${r.status})`)}
      return r.text()
    })
    .then(text=>{
      if(!text||!text.trim())throw new Error(`Empty response: ${name}`);
      Papa.parse(text,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>{
        console.log(`✅ ${name}: ${r.data.length} rows, cols: ${r.meta.fields?.slice(0,5).join(', ')}...`);
        res(r.data);
      },error:e=>{console.error(`❌ Parse error: ${name}`,e);rej(e)}});
    })
    .catch(e=>{
      console.error(`❌ Fetch error: ${name} (attempt ${attempt})`,e);
      if(attempt<3){
        setTimeout(()=>fetchSheet(name,attempt+1).then(res).catch(rej),300*attempt);
      }else{
        rej(new Error(`Sheet load failed: ${name}`));
      }
    });
  });
}

function normalizeDate(val){
  const s=String(val||"").trim();
  if(!s)return"";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}\/\d{2}\/\d{2}$/.test(s))return s.replace(/\//g,"-");
  const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy){const[,m,d,y]=mdy;return`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
  const parsed=new Date(s);
  if(!Number.isNaN(parsed.getTime()))return`${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,"0")}-${String(parsed.getDate()).padStart(2,"0")}`;
  return s;
}

function getPickGuard(latestDate,picksCount){

  const today=easternTodayISO();

      ?{level:"warn",text:"Engine issue — AI picks are missing or incomplete for tonight's slate."}

function firstValidPlayer(arr){
  if(!arr||!arr.length)return "";
  for(let i=0;i<Math.min(arr.length,30);i++){
    const row=arr[i];if(!row)continue;
    const n=row.player_name;
    if(n&&String(n).trim().length>1)return String(n).trim();
  }
  const first=arr[0];if(!first)return "";
  const key=Object.keys(first).find(k=>k.replace(/[^a-zA-Z_]/g,'').toLowerCase()==="player_name"||k.includes("player_name"));
  if(key){
    for(let i=0;i<Math.min(arr.length,30);i++){
      const v=arr[i]?.[key];
      if(v&&String(v).trim().length>1)return String(v).trim();
    }
  }
  console.warn("⚠️ Could not find player_name. Keys:",Object.keys(first).slice(0,5));
  return "";
}

function getDingerCombos(board,legs){
  if(board.length<legs)return[];
  const combos=[];
  function gen(start,current){
    if(current.length===legs){
      const teams=current.map(d=>d.team);
      if(new Set(teams).size===legs){
        const score=current.reduce((s,d)=>s+d.score,0);
        combos.push({players:current.slice(),score,teams});
      }
      return;
    }
    for(let i=start;i<board.length&&combos.length<500;i++){
      current.push(board[i]);
      gen(i+1,current);
      current.pop();
    }
  }
  gen(0,[]);
  combos.sort((a,b)=>b.score-a.score);
  return combos.slice(0,10);
}

// ═══ +EV ENGINE ═══
function impliedProb(odds){
  if(!odds&&odds!==0)return null;
  const o=parseInt(odds);if(isNaN(o))return null;
  return o<0?Math.abs(o)/(Math.abs(o)+100):100/(o+100);
}
function computeMedian(arr){const vals=(arr||[]).map(Number).filter(Number.isFinite).sort((a,b)=>a-b);if(!vals.length)return null;const mid=Math.floor(vals.length/2);return vals.length%2?vals[mid]:(vals[mid-1]+vals[mid])/2}
function impliedToAmerican(p){const prob=Number(p);if(!Number.isFinite(prob)||prob<=0||prob>=1)return null;return prob>=0.5?Math.round(-100*prob/(1-prob)):Math.round(100*(1-prob)/prob)}
function americanCentsDiff(odds1,odds2){const a=parseInt(odds1),b=parseInt(odds2);if(!Number.isFinite(a)||!Number.isFinite(b))return null;return Math.abs(a-b)}

function getHitRate(name,metric,line,isP){
  const logs=getPlayerLogs(name,isP);
  if(logs.length<3)return null;
  const ln=parseFloat(line);if(isNaN(ln))return null;
  const combo=COMBO_STATS[metric];
  let over=0,under=0,push=0;
  for(const g of logs){
    const val=combo?combo.reduce((s,k)=>s+toNum(g[k]),0):metric==="P_OUTS"?toNum(g.IP_OUTS):toNum(g[metric]);
    if(val>ln)over++;
    else if(val<ln)under++;
    else push++;
  }
  const nonPush=over+under;
  return{
    overRate:nonPush?over/nonPush:0,
    underRate:nonPush?under/nonPush:0,
    pushRate:logs.length?push/logs.length:0,
    over,under,push,nonPush,total:logs.length
  };
}

function propToLogCol(metric){
  if(COMBO_STATS[metric])return metric;
  const map={H:"H",TB:"TB",HR:"HR",RBI:"RBI",R:"R",SB:"SB",BB:"BB","1B":"1B","2B":"2B",Batter_SO:"SO",P_SO:"SO",P_H:"H",P_BB:"BB",P_ER:"ER",P_OUTS:"P_OUTS"};
  return map[metric]||metric;
}

function isPitcherProp(metric){return(metric||"").startsWith("P_")}

function getBestBets(){
  return getMemo("bestBets",()=>{
  if(!st.props.length)return[];
  const bets=[];
  for(const p of st.props){
    const name=p.PLAYER_NAME;if(!name)continue;
    const metric=p.METRIC;
    const line=parseFloat(p.DK_LINE);if(isNaN(line))continue;
    const overOdds=parseInt(p.OVER_ODDS);
    const underOdds=parseInt(p.UNDER_ODDS);
    if(isNaN(overOdds)&&isNaN(underOdds))continue;

    const logCol=propToLogCol(metric);
    const isP=isPitcherProp(metric);
    const hr=getHitRate(name,logCol,line,isP);
    if(!hr||hr.total<3||!hr.nonPush)continue;

    const overIP=impliedProb(overOdds);
    const underIP=impliedProb(underOdds);

    let overEdge=null,underEdge=null;
    if(overIP!==null)overEdge=hr.overRate-overIP;
    if(underIP!==null)underEdge=hr.underRate-underIP;

    let lean,edge,odds,ip,hitRate;
    if(overEdge!==null&&underEdge!==null){
      if(overEdge>=underEdge){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.overRate}
      else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=hr.underRate}
    }else if(overEdge!==null){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.overRate}
    else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=hr.underRate}

    if(edge===null)continue;

    const pT=getTonightPlayerRow(name,false)||getTonightPlayerRow(name,true)||{};

    const flags=getSampleFlags(name,isP);
    bets.push({
      name,metric,line,lean,edge,odds,
      impliedProb:ip,hitRate,
      hits:lean==="OVER"?hr.over:hr.under,
      total:hr.nonPush,
      team:pT.team_abbr||"",
      opp:pT.opp_abbr_tonight||"",
      pitcher:pT.opp_pitcher_name||"",
      hand:pT.opp_pitcher_hand||"",
      dkLine:p.DK_LINE,
      overOdds:p.OVER_ODDS,
      underOdds:p.UNDER_ODDS,
      prop:p,
      isP,
      teamSlot:`${pT.team_abbr||""}${isP?":P":":B"}`,
      returning:flags.returning,
      limitedSample:flags.limited
    });
  }
  bets.sort((a,b)=>(a.returning===b.returning?b.edge-a.edge:(a.returning?1:-1)));
  return bets;
  });
}

function getConvictionLegs(){
  const SLIP_WORTHY=new Set(["H","HR","RBI","R","TB","SB","BB","H+R+RBI","H+R","R+RBI","P_SO","P_H","P_BB","P_ER","P_OUTS","UD_FP"]); const bets=getBestBets().filter(b=>b.edge>0&&!b.returning&&!getLockInfo(b.name,b.isP).started).filter(b=>{   if(!SLIP_WORTHY.has(b.metric))return false;   if(b.lean==="UNDER"&&parseFloat(b.dkLine)<=0.5)return false;   return true; });
  if(!bets.length)return[];

  const latestDate=getLatestPickDate();
  const latestRun=getLatestPickRun();
  const aiMap=new Map();
  st.picks.filter(pk=>normalizeDate(rowField(pk,"DATE"))===latestDate&&toNum(rowField(pk,"RUN_NUMBER"))===latestRun).forEach(pk=>{if(pk.player)aiMap.set(normalizePlayerName(pk.player),pk)});
  const streakMap=new Map();
  try{
    const streaks=getStreaks();
    streaks.forEach(s=>{const k=`${normalizePlayerName(s.player)}|${normalizePropMetric(s.stat)}`;streakMap.set(k,s)});
  }catch(e){}

  const legs=[];
  for(const b of bets){
    const nl=normalizePlayerName(b.name);
    const evScore=Math.min(b.edge*40,10);
    let aiScore=0;
    const aiPick=aiMap.get(nl);
    let aiConflictLevel="",aiDisagreementText="";
    if(aiPick){
        const conf=normalizeConfidence(aiPick.confidence);
        const aiLean=normalizeLeanText(aiPick.lean);
        const aiMetric=normalizePropMetric(aiPick.prop_type);
        const betMetric=normalizePropMetric(b.metric);
        const aiComps=COMBO_STATS[aiMetric]||[aiMetric];
        const betComps=COMBO_STATS[betMetric]||[betMetric];
        const metricsRelated=betComps.some(c=>aiComps.includes(c))||aiComps.some(c=>betComps.includes(c));
        if(metricsRelated && aiLean && aiLean!==b.lean){
          aiConflictLevel=aiMetric===betMetric?"strong":"soft";
          aiDisagreementText=aiMetric===betMetric?`AI says ${aiLean} ${aiMetric}`:`AI leans ${aiLean} ${aiMetric}`;
          aiScore-=conf==="SMASH"?2.5:conf==="STRONG"?1.5:0.75;
        }else if(aiAgreesWithBet(aiPick,b)){
          aiScore=conf==="SMASH"?6:4;
        }
      }
    let streakScore=0;
    const logCol=propToLogCol(b.metric);
    const sk=`${nl}|${normalizePropMetric(logCol)}`;
    const streak=streakMap.get(sk);
    if(streak){
      if(streak.streak>=7)streakScore=3;
      else if(streak.streak>=5)streakScore=2;
      else if(streak.streak>=3)streakScore=1;
    }
    const reliabilityScore=Math.min(b.total/10,2);
    const hrScore=b.hitRate>=0.8?2:b.hitRate>=0.65?1:0;

    const conviction=evScore+aiScore+streakScore+reliabilityScore+hrScore;

    let signals=[];
    if(aiAgreesWithBet(aiPick,b)){const c=normalizeConfidence(aiPick.confidence);signals.push(c==="SMASH"?"SMASH":c==="STRONG"?"STRONG":"AI")}
    if(aiConflictLevel==="strong")signals.push(`${icon('warn')}AI conflict`);
    else if(aiConflictLevel==="soft")signals.push(`${icon('warn')}AI cross-check`);
    if(streak)signals.push(`🔥 ${streak.streak}G streak`);
    if(b.edge>=0.15)signals.push("💎 Elite EV");
    else if(b.edge>=0.08)signals.push("📈 Strong EV");
    if(b.hitRate>=0.8)signals.push(`✅ ${(b.hitRate*100).toFixed(0)}% hit`);

    const scheduleRow=getScheduleRow(b.team,b.opp)||{};
    const gameTotal=toNum(scheduleRow.over_under||scheduleRow.game_total);
    const gameKey=[b.team||"",b.opp||""].sort().join("|");
    legs.push({...b,conviction,evScore,aiScore,streakScore,reliabilityScore,hrScore,signals,hasAI:aiAgreesWithBet(aiPick,b),hasAIConflict:!!aiConflictLevel,aiConflictLevel,aiDisagreementText,hasStreak:!!streak,teamSlot:b.teamSlot||`${b.team}${b.isP?":P":":B"}`,gameTotal,gameKey});
  }
  legs.sort((a,b)=>b.conviction-a.conviction);
  return legs;
}

function generateSlips(legs,legCount){
  if(legs.length<legCount)return[];
  const slips=[];
  const maxIter=legCount<=3?500:300;

  function gen(start,current,usedPlayers,teamCounts){
    if(current.length===legCount){
      let score=current.reduce((s,l)=>s+l.conviction,0);
      const avgEdge=current.reduce((s,l)=>s+l.edge,0)/legCount;
      const avgHitRate=current.reduce((s,l)=>s+l.hitRate,0)/legCount;
      const teams=[...new Set(current.map(l=>l.teamSlot||l.team))];
      const signals=current.reduce((s,l)=>s+l.signals.length,0);
      const slipTags=[];
      for(let i=0;i<current.length;i++){for(let j=i+1;j<current.length;j++){const a=current[i],b=current[j];if(a.gameKey&&a.gameKey===b.gameKey&&a.team!==b.team&&Math.max(toNum(a.gameTotal),toNum(b.gameTotal))>9.5){score*=1.10;slipTags.push("⚡ GAME STACK")}}}
      slips.push({legs:current.slice(),score,avgEdge,avgHitRate,teams,signalCount:signals,legCount,slipTags:[...new Set(slipTags)]});
      return;
    }
    for(let i=start;i<pool.length&&slips.length<maxIter;i++){
      const leg=pool[i];
      if(usedPlayers.has(leg.name.toLowerCase()))continue;
      const slot=leg.teamSlot||leg.team;
      const tc=teamCounts.get(slot)||0;
      if(tc>=2)continue;

      usedPlayers.add(leg.name.toLowerCase());
      teamCounts.set(slot,(tc||0)+1);
      current.push(leg);
      gen(i+1,current,usedPlayers,teamCounts);
      current.pop();
      usedPlayers.delete(leg.name.toLowerCase());
      teamCounts.set(slot,tc);
    }
  }
  const pool=legs.slice(0,legCount<=3?15:legCount<=4?18:20);
  gen(0,[],new Set(),new Map());
  slips.sort((a,b)=>b.score-a.score);

  // Player diversity: try strictest cap first, relax only as needed to hit 8 slips.
  const MAX_SLIPS=8;
  let selected=[];
  for(let cap=2;cap<=MAX_SLIPS;cap++){
    selected=[];
    const playerUsageCount=new Map();
    for(const slip of slips){
      if(selected.length>=MAX_SLIPS)break;
      const overUsed=slip.legs.some(l=>(playerUsageCount.get(l.name.toLowerCase())||0)>=cap);
      if(overUsed)continue;
      selected.push(slip);
      slip.legs.forEach(l=>{
        const n=l.name.toLowerCase();
        playerUsageCount.set(n,(playerUsageCount.get(n)||0)+1);
      });
    }
    if(selected.length>=MAX_SLIPS)break;
  }
  return selected.slice(0,MAX_SLIPS);
}

    const prop=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===normalizePlayerName(name)&&normalizePropMetric(pr.METRIC)===normalizePropMetric(sType.key));

function getDueBoard(){
  return getMemo("dueBoard",()=>{
  const due=[];
  // --- BATTERS ---
  const batStats=["H","HR","RBI","R","TB","SB","BB"];
  const tonightNames=new Set(st.tonight.map(p=>p.player_name).filter(Boolean));
  for(const name of tonightNames){
    const logs=getPlayerLogs(name,false);
    if(logs.length<7)continue; // need enough data
    const pT=getTonightPlayerRow(name,false)||{};
    const most=logs[0]||{};

    for(const stat of batStats){
      const seasAvg=toNum(most[`Seas_${stat}`]);
      const l7Avg=toNum(most[`L7_${stat}`]);
      if(seasAvg<=0)continue;

      // Cold gap: how far below season average is L7?
      const coldGap=(seasAvg-l7Avg)/seasAvg;
      if(coldGap<0.25)continue; // need at least 25% below season avg

      // Drought: consecutive games below season avg for this stat
      let drought=0;
      for(const g of logs){
        if(toNum(g[stat])<seasAvg)drought++;
        else break;
      }
      if(drought<2)continue;

      // Matchup score
      let matchupScore=0;
      let matchupTags=[];
      // Handedness split advantage
      const hand=pT.opp_pitcher_hand||"R";
      const vsAvg=toNum(pT.vs_OPP_AVG);
      const vsOps=toNum(pT.vs_OPP_OPS);
      if(vsAvg>=0.280){matchupScore+=3;matchupTags.push(`vs ${hand}HP: ${vsAvg.toFixed(3)}`)}
      else if(vsAvg>=0.250){matchupScore+=1.5;matchupTags.push(`vs ${hand}HP: ${vsAvg.toFixed(3)}`)}
      if(vsOps>=0.850)matchupScore+=2;
      else if(vsOps>=0.750)matchupScore+=1;

      // Opposing pitcher quality (check if starter is in our pitcher logs)
      const oppPitcher=pT.opp_pitcher_name||"";
      if(oppPitcher&&oppPitcher!=="TBD"){
        const pLogs=getPlayerLogs(oppPitcher,true);
        if(pLogs.length>0){
          const pMost=pLogs[0];
          const era=toNum(pMost.Seas_ERA);
          const whip=toNum(pMost.Seas_WHIP);
          if(era>=4.50){matchupScore+=3;matchupTags.push(`vs ${oppPitcher} (${era.toFixed(2)} ERA)`)}
          else if(era>=4.00){matchupScore+=1.5;matchupTags.push(`vs ${oppPitcher} (${era.toFixed(2)} ERA)`)}
          if(whip>=1.40)matchupScore+=1.5;
          else if(whip>=1.25)matchupScore+=0.5;
        }
      }

      // Venue boost (Coors)
      const venue=pT.venue_tonight||"";
      if(venue.includes("Coors")){matchupScore+=2;matchupTags.push("🏔️ Coors")}

      // DK prop overlay
      const prop=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===normalizePlayerName(name)&&normalizePropMetric(pr.METRIC)===normalizePropMetric(stat));
      let propTag=null;
      if(prop){propTag={line:prop.DK_LINE,overOdds:parseInt(prop.OVER_ODDS)||null}}

      // Total score: cold gap importance + drought length + matchup quality
      const coldScore=coldGap*15; // 0-15 range (25%-100% below)
      const droughtScore=Math.min(drought*1.5,10);
      const totalScore=coldScore+droughtScore+matchupScore;

      if(totalScore<5)continue; // minimum threshold

      const recentVals=logs.slice(0,7).map(g=>toNum(g[stat]));

      due.push({
        name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",
        pitcher:pT.opp_pitcher_name||"TBD",hand:pT.opp_pitcher_hand||"?",
        venue,stat,type:"bat",
        seasAvg:seasAvg.toFixed(2),l7Avg:l7Avg.toFixed(2),
        coldGap:(coldGap*100).toFixed(0),
        drought,matchupScore,matchupTags,
        propTag,recentVals,totalScore
      });
    }
  }

  // --- PITCHERS ---
  const pNames=new Set(st.pTonight.map(p=>p.player_name).filter(Boolean));
  for(const name of pNames){
    const logs=getPlayerLogs(name,true);
    if(logs.length<3)continue;
    const pT=getTonightPlayerRow(name,true)||{};
    const most=logs[0]||{};

    // Pitcher "due" — strikeout pitcher in a slump, ace with bad recent ERA
    const pStats=[
      {key:"SO",label:"Strikeouts",higher:true},
      {key:"UD_FP",label:"UD Fantasy",higher:true},
    ];

    for(const ps of pStats){
      const seasAvg=toNum(most[`Seas_${ps.key}`]);
      const l3Avg=toNum(most[`L3_${ps.key}`]);
      if(seasAvg<=0)continue;

      const coldGap=(seasAvg-l3Avg)/seasAvg;
      if(coldGap<0.20)continue;

      let drought=0;
      for(const g of logs){
        if(toNum(g[ps.key])<seasAvg)drought++;
        else break;
      }
      if(drought<2)continue;

      // Matchup: opposing team's batting quality (use schedule to find opp)
      let matchupScore=0;
      let matchupTags=[];
      const oppAbbr=pT.opp_abbr_tonight||"";

      // Check opponent team batting average from tonight's batters
      if(oppAbbr){
        const oppBatters=st.tonight.filter(b=>b.team_abbr===oppAbbr);
        if(oppBatters.length>0){
          const teamSeasAvg=oppBatters.reduce((s,b)=>s+toNum(b.Seas_H),0)/oppBatters.length;
          if(teamSeasAvg<0.8){matchupScore+=3;matchupTags.push(`vs weak ${oppAbbr} lineup`)}
          else if(teamSeasAvg<1.0){matchupScore+=1.5;matchupTags.push(`vs avg ${oppAbbr} lineup`)}
        }
      }

      // Home/away advantage
      const ha=pT.home_away_tonight||"";
      if(ha==="Home"){matchupScore+=1;matchupTags.push("🏠 Home")}

      const prop=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===normalizePlayerName(name)&&normalizePropMetric(pr.METRIC)==="P_SO");
      let propTag=null;
      if(prop){propTag={line:prop.DK_LINE,overOdds:parseInt(prop.OVER_ODDS)||null}}

      const coldScore=coldGap*15;
      const droughtScore=Math.min(drought*2,10);
      const totalScore=coldScore+droughtScore+matchupScore;

      if(totalScore<4)continue;

      const recentVals=logs.slice(0,7).map(g=>toNum(g[ps.key]));

      due.push({
        name,team:pT.team_abbr||"",opp:oppAbbr,
        pitcher:"",hand:"",
        venue:pT.venue_tonight||"",stat:ps.key,type:"pitch",
        seasAvg:seasAvg.toFixed(2),l7Avg:l3Avg.toFixed(2),
        coldGap:(coldGap*100).toFixed(0),
        drought,matchupScore,matchupTags,
        propTag,recentVals,totalScore
      });
    }
  }

  // Deduplicate: keep best stat per player
  const best={};
  for(const d of due){
    const k=d.name;
    if(!best[k]||d.totalScore>best[k].totalScore)best[k]=d;
  }
  const result=Object.values(best);
  result.sort((a,b)=>b.totalScore-a.totalScore);
  return result;
  });
}

function dueMiniChart(vals,seasAvg){
  const mx=Math.max(...vals,seasAvg+1);
  return vals.slice().reverse().map(v=>{
    const h=Math.max(3,(v/mx)*26);
    return`<div class="due-chart-bar" style="height:${h}px;background:${v>=seasAvg?'var(--over)':'#38bdf8'};opacity:.85"></div>`;
  }).join("");
}

function getConvergenceBoard(){
  return getMemo("convergenceBoard",()=>{
  const board=new Map();
  const latestDate=getLatestPickDate();
  const latestRun=getLatestPickRun();
  const allowed=new Set(st.picks.filter(p=>normalizeDate(rowField(p,"DATE"))===latestDate&&toNum(rowField(p,"RUN_NUMBER"))===latestRun).map(p=>normalizePlayerName(p.player)).filter(Boolean));
  const add=(name,source,boost=0,meta={})=>{
    if(!name)return;
    const key=normalizePlayerName(name);
    if(allowed.size && !allowed.has(key))return;
    if(!board.has(key))board.set(key,{name,sources:new Set(),score:0,team:meta.team||"",opp:meta.opp||"",detail:""});
    const row=board.get(key);
    row.sources.add(source);
    row.score+=boost;
    if(!row.team&&meta.team)row.team=meta.team;
    if(!row.opp&&meta.opp)row.opp=meta.opp;
    if(!row.detail&&meta.detail)row.detail=meta.detail;
  };
  const bestBetMap=new Map();
  getBestBets().filter(b=>b.edge>0).slice(0,20).forEach(b=>{
    bestBetMap.set(normalizePlayerName(b.name),b);
    add(b.name,"Best Bets",2+Math.min(b.edge*20,3),{team:b.team,opp:b.opp,detail:`${b.lean} ${b.metric} ${b.dkLine}`});
  });
  st.picks.filter(p=>normalizeDate(rowField(p,"DATE"))===latestDate&&toNum(rowField(p,"RUN_NUMBER"))===latestRun).forEach(pk=>{
    const bestBet=bestBetMap.get(normalizePlayerName(pk.player));
    if(!aiAgreesWithBet(pk,bestBet))return;
    const conf=normalizeConfidence(pk.confidence);
    add(pk.player,"AI",conf==="SMASH"?4:conf==="STRONG"?3:2,{detail:`${pk.lean||""} ${pk.prop_type||""} ${pk.line||""}`.trim()});
  });
  getStreaks().slice(0,20).forEach(s=>add(s.player,"Streaks",s.streak>=7?3:s.streak>=5?2.5:2,{team:s.team,opp:s.opp,detail:`${s.streak}G ${s.stat}`}));
  getDueBoard().slice(0,20).forEach(d=>add(d.name,"Due",1.5+Math.min((d.totalScore||0)/12,2),{team:d.team,opp:d.opp,detail:`Due ${d.stat}`}));
  getDingerBoard().slice(0,15).forEach(d=>add(d.name,"Dingers",1.5+(d.hrRate||0)*3,{team:d.team,opp:d.opp,detail:`${(d.hrRate*100).toFixed(1)}% HR rate`}));
  return [...board.values()].map(r=>({...r,sourceCount:r.sources.size,sourceList:[...r.sources]})).filter(r=>r.sourceCount>=2).sort((a,b)=>b.sourceCount-a.sourceCount||b.score-a.score).slice(0,5);
  });
}

function getStatParlayBoard(stat){
  return getMemo(`statParlay:${stat}`,()=>{
  const rows=[];
  const isPS=stat.startsWith("P_");
  const logCol=propToLogCol(stat);
  const src=isPS?st.pTonight:st.tonight;

  for(const p of src){
    const name=p.player_name;if(!name)continue;
    const logs=getPlayerLogs(name,isPS);
    if(logs.length<3)continue;
    const most=logs[0]||{};

    // Find DK prop for this stat
    const prop=st.props.find(pr=>normalizePlayerName(pr.PLAYER_NAME)===normalizePlayerName(name)&&normalizePropMetric(pr.METRIC)===normalizePropMetric(stat));
    if(!prop)continue; // need a prop line to parlay

    const dkLine=parseFloat(prop.DK_LINE);if(isNaN(dkLine))continue;
    const overOdds=parseInt(prop.OVER_ODDS);
    const underOdds=parseInt(prop.UNDER_ODDS);

    // Hit rate over the line
    const combo=COMBO_STATS[logCol];
    const hitsOver=combo
      ?logs.filter(g=>combo.reduce((s,k)=>s+toNum(g[k]),0)>dkLine).length
      :logs.filter(g=>toNum(g[logCol])>dkLine).length;
    const hitRate=hitsOver/logs.length;

    // EV edge
    const overIP=impliedProb(overOdds);
    const edge=overIP!==null?hitRate-overIP:0;

    // Season and recent averages
    const seasAvg=getRollingVal(most,"Seas_",logCol);
    const l7Avg=isPS?getRollingVal(most,"L3_",logCol):getRollingVal(most,"L7_",logCol);

    // Matchup score
    let matchupScore=0;
    if(!isPS){
      const vsAvg=toNum(p.vs_OPP_AVG);
      if(vsAvg>=0.280)matchupScore+=2;
      else if(vsAvg>=0.250)matchupScore+=1;
      // Career vs SP
      const vsp=getVsSP(name);
      if(vsp){
        const cAB=toNum(vsp.AB);const cAVG=toNum(vsp.AVG);
        if(cAB>=5&&cAVG>=0.300)matchupScore+=2;
        else if(cAB>=5&&cAVG>=0.250)matchupScore+=1;
      }
    }

    // Composite score: hit rate is king, edge matters, matchup bonus
    const score=hitRate*40+Math.max(edge,0)*30+matchupScore*3+(l7Avg>seasAvg?5:0);

    rows.push({
      name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",
      pitcher:p.opp_pitcher_name||p.opp_starter||"TBD",
      hand:p.opp_pitcher_hand||"?",
      venue:p.venue_tonight||"",
      stat,dkLine,overOdds,underOdds,
      hitRate,hitsOver,total:logs.length,
      edge,seasAvg,l7Avg,matchupScore,score
    });
  }
  rows.sort((a,b)=>b.score-a.score);
  return rows;
  });
}

function getStatParlayCombos(board,legs){
  if(board.length<legs)return[];
  const combos=[];
  const pool=board.slice(0,legs<=2?12:15);
  function gen(start,current){
    if(current.length===legs){
      const teams=current.map(d=>d.team);
      const uniqueTeams=new Set(teams);
      // Max 2 from same team
      const teamCounts={};
      for(const t of teams){teamCounts[t]=(teamCounts[t]||0)+1;if(teamCounts[t]>2)return}
      const score=current.reduce((s,d)=>s+d.score,0);
      const avgHitRate=current.reduce((s,d)=>s+d.hitRate,0)/legs;
      const avgEdge=current.reduce((s,d)=>s+d.edge,0)/legs;
      combos.push({players:current.slice(),score,avgHitRate,avgEdge,teams:[...uniqueTeams]});
      return;
    }
    for(let i=start;i<pool.length&&combos.length<300;i++){
      // Unique players
      if(current.some(c=>c.name===pool[i].name))continue;
      current.push(pool[i]);
      gen(i+1,current);
      current.pop();
    }
  }
  gen(0,[]);
  combos.sort((a,b)=>b.score-a.score);
  return combos.slice(0,8);
}

function getDraftBoard(){

    const projUD=toNum(most.Seas_UD_FP)||(s1B*3+s2B*6+s3B*8+sHR*10+sBB*3+sHBP*3+sRBI*2+sR*2+sSB*4)||0;
    const l7H=toNum(most.L7_H),l7HR=toNum(most.L7_HR),l72B=toNum(most.L7_2B);
    const l7TB=toNum(most.L7_TB),l7RBI=toNum(most.L7_RBI),l7R=toNum(most.L7_R);
    const l7SB=toNum(most.L7_SB),l7BB=toNum(most.L7_BB),l7HBP=toNum(most.L7_HBP);
    const l73B=Math.max(0,(l7TB-l7H-l72B-3*l7HR)/2)||0;
    const l71B=Math.max(0,l7H-l72B-l73B-l7HR)||0;
    const l7UD=toNum(most.L7_UD_FP)||(l71B*3+l72B*6+l73B*8+l7HR*10+l7BB*3+l7HBP*3+l7RBI*2+l7R*2+l7SB*4)||0;
    const ai=aiMap.get(normalizePlayerName(name)),isSmash=ai&&normalizeConfidence(ai.confidence)==="SMASH";
    let pos="FLEX";const posRaw=(p.position||"").toUpperCase();
    if(posRaw.includes("C")||posRaw.includes("1B")||posRaw.includes("2B")||posRaw.includes("3B")||posRaw.includes("SS"))pos="IF";
    else if(posRaw.includes("OF")||posRaw.includes("LF")||posRaw.includes("CF")||posRaw.includes("RF"))pos="OF";
    const flags=getSampleFlags(name,false);
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:p.opp_pitcher_name||"TBD",hand:p.opp_pitcher_hand||"?",projUD:projUD.toFixed(1),l7UD:l7UD.toFixed(1),sH,sHR,sRBI,sR,sSB,sBB,isSmash,isPitcher:false,pos,returning:flags.returning,limitedSample:flags.limited});
  }
  for(const p of st.pTonight){
    const name=p.player_name;if(!name)continue;
    const logs=getPlayerLogs(name,true);
    if(!logs.length)continue;const most=logs[0]||{};
    const sSO=toNum(most.Seas_SO),sER=toNum(most.Seas_ER),sW=toNum(most.Seas_W),sIP=toNum(most.Seas_IP);
    const qsRate=logs.length>0?logs.filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length/logs.length:0;
    const projUD=toNum(most.Seas_UD_FP)||(sW*5+qsRate*5+sSO*3+sIP*3+sER*-3)||0;
    const l3SO=toNum(most.L3_SO),l3ER=toNum(most.L3_ER),l3W=toNum(most.L3_W),l3IP=toNum(most.L3_IP);
    const l3QS=logs.slice(0,3).filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length/Math.min(3,logs.length);
    const l7UD=toNum(most.L7_UD_FP)||(l3W*5+l3QS*5+l3SO*3+l3IP*3+l3ER*-3)||0;
    const ai=aiMap.get(normalizePlayerName(name)),isSmash=ai&&normalizeConfidence(ai.confidence)==="SMASH";
    const flags=getSampleFlags(name,true);
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:"",hand:"",projUD:projUD.toFixed(1),l7UD:l7UD.toFixed(1),sSO,sER,sW,sIP,qsRate,isSmash,isPitcher:true,pos:"P",returning:flags.returning,limitedSample:flags.limited});
  }
  board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));
  return board;
  });
}

function getDraftStacks(){
  return getMemo("draftStacks",()=>{
    const board=getDraftBoard().filter(p=>!p.isPitcher);
    const byName=new Map(board.map(p=>[normalizePlayerName(p.name),p]));
    const byTeam=new Map();
    for(const row of st.tonight||[]){
      const key=normalizePlayerName(row.player_name);
      if(!key||!byName.has(key))continue;
      const team=row.team_abbr||"";
      if(!byTeam.has(team))byTeam.set(team,[]);
      byTeam.get(team).push(row);
    }
    const pairs=[];const seen=new Set();
    for(const [team,rows] of byTeam.entries()){
      for(let i=0;i<rows.length;i++){
        for(let j=i+1;j<rows.length;j++){
          const ra=rows[i],rb=rows[j];
          const a=byName.get(normalizePlayerName(ra.player_name));
          const b=byName.get(normalizePlayerName(rb.player_name));
          if(!a||!b)continue;
          const key=[normalizePlayerName(a.name),normalizePlayerName(b.name)].sort().join("|");
          if(seen.has(key))continue;
          seen.add(key);
          const era=getMlbPitcherEra(ra.opp_pitcher_name||rb.opp_pitcher_name);
          const venue=ra.venue_tonight||rb.venue_tonight||"";
          const coors=/coors/i.test(venue)||["LAD","COL"].includes(team);
          const weakPitcher=era>=4.5;
          const proj=toNum(a.projUD)+toNum(b.projUD);
          const score=proj+(weakPitcher?4:0)+(coors?5:0)+(toNum(a.l7UD)>toNum(a.projUD)?1:0)+(toNum(b.l7UD)>toNum(b.projUD)?1:0);
          const tags=[];
          if(coors)tags.push("⚡ HIGH TOTAL");
          if(weakPitcher)tags.push("STACK TARGET");
          if(team===ra.team_abbr&&team===rb.team_abbr)tags.push("🔗 CORRELATED");
          pairs.push({players:[a,b],score,combinedProj:proj.toFixed(1),tags,team,opp:a.opp,pitcher:ra.opp_pitcher_name||"TBD",era,venue});
        }
      }
    }
    return pairs.sort((a,b)=>b.score-a.score).slice(0,10);
  });
}

function getDraftStackTagMap(){

    const map=new Map();

        if(!map.has(key))map.set(key,new Set());

const STATS_WINDOWS=[['last_7d','Last 7 days'],['last_30d','Last 30 days'],['last_90d','Last 90 days'],['all_time','All time']];
const STATS_BREAK_EVEN=0.524;

function entryField(row,keys){for(const k of keys){if(row&&row[k]!==undefined&&row[k]!==null&&String(row[k]).trim()!=='')return row[k]}return ''}
function entryMetric(m){return typeof normalizePropMetric==='function'?normalizePropMetric(m):(typeof normalizePropName==='function'?normalizePropName(m):String(m||'').trim().toUpperCase())}
function entryTeam(row){return String(entryField(row,['team_abbr','TEAM_ABBREVIATION','TEAM','team','teamAbbr','TEAM_ABBR'])||'').trim().toUpperCase()}
function entryOpp(row){return String(entryField(row,['opp_abbr_tonight','TONIGHT_OPP','OPP','opponent','OPPONENT','opp'])||'').trim().toUpperCase()}
function entryPlayer(row){return cleanName(entryField(row,['player_name','PLAYER_NAME','PLAYER','player','Player']))}
function entryPairId(a,b){a=String(a||'').trim().toUpperCase();b=String(b||'').trim().toUpperCase();if(!a||!b)return '';return [a,b].sort().join('|')}
function entryGameFromText(game){const s=String(game||'').trim();const m=s.match(/\b([A-Z]{2,4})\s*(?:@|vs\.?|VS)\s*([A-Z]{2,4})\b/);if(!m)return null;return {id:entryPairId(m[1],m[2]),label:s,teams:[m[1],m[2]]}}
function entryTodayISO(){const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date()).reduce((a,p)=>(a[p.type]=p.value,a),{});return `${parts.year}-${parts.month}-${parts.day}`}
function entryDateISO(v){if(v===undefined||v===null||String(v).trim()==='')return '';const raw=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;const md=raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(md)return `${md[3]}-${md[1].padStart(2,"0")}-${md[2].padStart(2,"0")}`;const n=Number(raw);if(Number.isFinite(n)&&n>20000&&n<90000){const d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10)}const d=new Date(raw);if(Number.isNaN(d.getTime()))return typeof normalizeDate==='function'?normalizeDate(raw):'';const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d).reduce((a,p)=>(a[p.type]=p.value,a),{});return `${parts.year}-${parts.month}-${parts.day}`}
function entryRowDate(row){return entryField(row,['DATE','date','GAME_DATE','game_date','Date','GAME_DAY','game_day','start_date','START_DATE','commence_time','COMMENCE_TIME','game_time','GAME_TIME','start_time','START_TIME'])}
function entryRowIsToday(row){const raw=entryRowDate(row);const iso=entryDateISO(raw);return !iso||iso===entryTodayISO()}
function entryStartValue(row){return entryField(row,['commence_time','COMMENCE_TIME','game_time','GAME_TIME','start_time','START_TIME','GAME_DATE','game_date','DATE','date'])}
function entryStartMs(v){if(v===undefined||v===null||String(v).trim()==='')return Number.POSITIVE_INFINITY;const d=new Date(String(v));return Number.isNaN(d.getTime())?Number.POSITIVE_INFINITY:d.getTime()}
function entryDisplayTime(v){const ms=entryStartMs(v);if(!Number.isFinite(ms))return '';return new Date(ms).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York',timeZoneName:'short'})}
function entryAllPicks(){return Array.isArray(st.picks)&&st.picks.length?st.picks:(Array.isArray(st.aiPicks)?st.aiPicks:[])}
function entryRosterRows(){const rows=[];const add=(arr,type)=>{(arr||[]).forEach(r=>{const player=entryPlayer(r),team=entryTeam(r),opp=entryOpp(r);if(player&&team&&opp)rows.push({player,team,opp,type,row:r,id:entryPairId(team,opp)})})};add(st.tonight,'player');add(st.pTonight,'player');add(st.gTonight,'player');return rows}
function getEntryGames(){return getMemo('gameEntry:games',()=>{const byId=new Map();const add=(id,label,teams=[],time='')=>{if(!id)return;const sortTime=entryStartMs(time);const timeText=entryDisplayTime(time);const baseLabel=label||teams.join(' vs ');const displayLabel=timeText?`${baseLabel} — ${timeText}`:baseLabel;if(!byId.has(id))byId.set(id,{id,label:displayLabel,baseLabel,teams,time,sortTime});else{const g=byId.get(id);if((baseLabel||'').includes('@')){g.baseLabel=baseLabel;g.label=timeText?`${baseLabel} — ${timeText}`:baseLabel}if(Number.isFinite(sortTime)&&!Number.isFinite(g.sortTime)){g.time=time;g.sortTime=sortTime;g.label=timeText?`${g.baseLabel} — ${timeText}`:g.baseLabel}}};entryLatestPicks().forEach(p=>{const g=entryGameFromText(rowField(p,"game","matchup"));if(g)add(g.id,g.label,g.teams,entryStartValue(p))});entryRosterRows().forEach(r=>{if(entryRowIsToday(r.row))add(r.id,`${r.team} vs ${r.opp}`,[r.team,r.opp],entryStartValue(r.row))});(st.schedule||[]).forEach(r=>{if(!entryRowIsToday(r))return;const away=String(entryField(r,['away_team','AWAY_TEAM','away','AWAY','away_abbr','away_team_abbr'])||'').toUpperCase();const home=String(entryField(r,['home_team','HOME_TEAM','home','HOME','home_abbr','home_team_abbr'])||'').toUpperCase();const t=entryStartValue(r);if(away&&home)add(entryPairId(away,home),`${away} @ ${home}`,[away,home],t)});return [...byId.values()].sort((a,b)=>(a.sortTime-b.sortTime)||a.baseLabel.localeCompare(b.baseLabel))})}
function setGameEntryGame(gameId){st.gameEntry=st.gameEntry||{selectedGame:null,legCount:GAME_ENTRY_DEFAULT_LEGS,entry:null};st.gameEntry.selectedGame=gameId;st.gameEntry.entry=null;st.dataVersion++;render()}
function setGameEntryLegs(n){st.gameEntry=st.gameEntry||{selectedGame:null,legCount:GAME_ENTRY_DEFAULT_LEGS,entry:null};st.gameEntry.legCount=Math.max(GAME_ENTRY_MIN_LEGS,Math.min(GAME_ENTRY_MAX_LEGS,parseInt(n)||GAME_ENTRY_DEFAULT_LEGS));st.gameEntry.entry=null;st.dataVersion++;render()}
function entryLatestPicks(){const rows=entryAllPicks().filter(p=>entryDateISO(rowField(p,"DATE"))===entryTodayISO());const maxRun=Math.max(0,...rows.map(p=>toNum(rowField(p,"RUN_NUMBER"))));return maxRun?rows.filter(p=>toNum(rowField(p,"RUN_NUMBER"))===maxRun):rows}
function entryFindProp(player,metric,line){const pn=normalizePlayerName(player),mn=entryMetric(metric),lt=String(line??'').trim();return (st.props||[]).find(p=>normalizePlayerName(p.PLAYER_NAME)===pn&&entryMetric(p.METRIC)===mn&&(lt===''||String(p.DK_LINE??'').trim()===lt))||(st.props||[]).find(p=>normalizePlayerName(p.PLAYER_NAME)===pn&&entryMetric(p.METRIC)===mn)||null}
function entryBookName(book){const k=String(book||'').toLowerCase();return {draftkings:'DK',fanduel:'FD',betmgm:'BetMGM',espnbet:'ESPN BET',caesars:'Caesars'}[k]||String(book||'')}
function entryBestBook(prop,lean){if(!prop)return null;const side=String(lean||'OVER').toUpperCase()==='UNDER'?'UNDER':'OVER';const book=prop[`BEST_${side}_BOOK`];const odds=prop[`BEST_${side}_ODDS`];if(!book||odds==='')return null;const delta=Number(prop[`BEST_${side}_DELTA_PP`]);return {book:String(book),odds,delta:Number.isFinite(delta)?delta:null,isDK:String(book).toLowerCase()==='draftkings'}}
function renderEntryBestBookLine(prop,lean){const b=entryBestBook(prop,lean);if(!b)return '';const color=b.isDK?'var(--push)':'var(--accent)';const delta=b.delta!==null&&!b.isDK&&Math.abs(b.delta)>0.05?` (${b.delta>0?'+':''}${b.delta.toFixed(1)}pp${b.delta>=3?' ⭐':''})`:'';return `<div style="font-size:var(--t-xs);color:${color};font-weight:800;margin-top:3px">🏪 Best @ ${entryBookName(b.book)} ${entryFmtOdds(b.odds)}${delta}</div>`}
function entryBestBookKey(leg){const b=entryBestBook(leg.prop,leg.lean);return b?entryBookName(b.book):''}
function entryPerfWLB(metric){const mn=entryMetric(metric);const row=(st.pickPerformance||[]).find(r=>String(rowField(r,"DIMENSION_TYPE")).toLowerCase()==='prop_type_norm'&&entryMetric(rowField(r,"DIMENSION_VALUE"))===mn&&String(rowField(r,"TIME_WINDOW"))==='all_time'&&String(rowField(r,"MIN_SAMPLE_FLAG")).toUpperCase()==='TRUE');const v=row?Number(rowField(row,"WILSON_LOWER_95")):NaN;return Number.isFinite(v)?v:GAME_ENTRY_DEFAULT_WLB}
function buildCandidatePool(gameId){const games=getEntryGames();const game=games.find(g=>g.id===gameId);if(!game)return {game:null,candidates:[]};const roster=entryRosterRows().filter(r=>r.id===gameId);const playerNames=new Set(roster.map(r=>normalizePlayerName(r.player)));const candidates=[];const seenAI=new Set();entryLatestPicks().forEach(p=>{const player=rowField(p,"player","PLAYER_NAME"),propType=rowField(p,"prop_type","METRIC"),line=rowField(p,"line","DK_LINE"),conf=rowField(p,"confidence"),g=entryGameFromText(rowField(p,"game","matchup"));let inGame=g&&g.id===gameId;if(!inGame&&playerNames.has(normalizePlayerName(player)))inGame=true;if(!inGame)return;const prop=entryFindProp(player,propType,line);if(!prop)return;const lean=String(rowField(p,"lean")||'OVER').toUpperCase()==='UNDER'?'UNDER':'OVER';const odds=lean==='OVER'?prop.OVER_ODDS:prop.UNDER_ODDS;if(!odds)return;const key=`${normalizePlayerName(player)}|${entryMetric(propType)}|${lean}`;seenAI.add(key);candidates.push({player,prop_type:entryMetric(propType),line:line||prop.DK_LINE,lean,odds,ai_tier:normalizeConfidence(conf),source:'AI',prop})});(st.props||[]).forEach(prop=>{if(!playerNames.has(normalizePlayerName(prop.PLAYER_NAME)))return;['OVER','UNDER'].forEach(lean=>{const odds=lean==='OVER'?prop.OVER_ODDS:prop.UNDER_ODDS;if(!odds)return;const key=`${normalizePlayerName(prop.PLAYER_NAME)}|${entryMetric(prop.METRIC)}|${lean}`;if(seenAI.has(key))return;candidates.push({player:prop.PLAYER_NAME,prop_type:entryMetric(prop.METRIC),line:prop.DK_LINE,lean,odds,ai_tier:'LEAN',source:'DK',prop})})});return {game,candidates}}
function scoreCandidate(c){const tier=normalizeConfidence(c.ai_tier||'LEAN');const tierWeight=GAME_ENTRY_TIER_WEIGHTS[tier]||GAME_ENTRY_TIER_WEIGHTS.LEAN;const wlb=entryPerfWLB(c.prop_type);return {...c,ai_tier:tier,tier_weight:tierWeight,wlb,leg_score:tierWeight*wlb}}
function selectTopN(candidates,n){const sorted=candidates.map(scoreCandidate).sort((a,b)=>b.leg_score-a.leg_score);const used=new Set(),perPlayer=new Map(),out=[];for(const c of sorted){const playerKey=normalizePlayerName(c.player),key=`${playerKey}|${entryMetric(c.prop_type)}`;if(used.has(key))continue;if((perPlayer.get(playerKey)||0)>=GAME_ENTRY_MAX_LEGS_PER_PLAYER)continue;used.add(key);perPlayer.set(playerKey,(perPlayer.get(playerKey)||0)+1);out.push(c);if(out.length>=n)break}return out}
function entryAmericanToDecimal(odds){const o=Number(String(odds).replace(/[^0-9+\-.]/g,''));if(!Number.isFinite(o)||o===0)return 1;return o>0?1+o/100:1+100/Math.abs(o)}
function entryDecimalToAmerican(dec){if(!Number.isFinite(dec)||dec<=1)return 0;return dec>=2?Math.round((dec-1)*100):-Math.round(100/(dec-1))}
function entryFmtOdds(odds){if(typeof fmtOdds==='function')return fmtOdds(odds);const o=Number(odds);return Number.isFinite(o)?(o>0?`+${o}`:`${o}`):String(odds||'—')}
function calculateParlayMath(legs){const decimal=legs.reduce((p,l)=>p*entryAmericanToDecimal(l.odds),1);return {decimal,american:entryDecimalToAmerican(decimal),return10:decimal*10,profit10:(decimal*10)-10}}
function buildGameEntry(){const ge=st.gameEntry||{};if(!ge.selectedGame)return null;const {game,candidates}=buildCandidatePool(ge.selectedGame);if(!game)return null;const requested=ge.legCount||GAME_ENTRY_DEFAULT_LEGS;const legs=selectTopN(candidates,requested);const math=calculateParlayMath(legs);return {game,requested,legs,candidates,math,score:legs.reduce((s,l)=>s+l.leg_score,0)}}
function renderGameSelector(games){if(!games.length)return `<div class="section"><div class="card"><div class="card-title">TONIGHT'S GAMES</div><div class="empty" style="padding:24px;text-align:center">No games scheduled tonight.</div></div></div>`;const sel=st.gameEntry?.selectedGame;return `<div class="section"><div class="card"><div class="card-title">TONIGHT'S GAMES</div><div style="display:grid;gap:8px;margin-top:10px">${games.map(g=>`<button onclick='setGameEntryGame(${JSON.stringify(g.id)})' style="text-align:left;border:1px solid ${sel===g.id?'var(--accent)':'#334155'};background:${sel===g.id?'color-mix(in srgb, var(--accent) 13%, transparent)':'transparent'};color:${sel===g.id?'var(--accent)':'inherit'};border-radius:8px;padding:10px 12px;font-weight:800;cursor:pointer">${esc(g.label)}${g.time?` <span style="opacity:.75;font-size:var(--t-xs)">— ${esc(g.time)}</span>`:''}</button>`).join('')}</div></div></div>`}
function renderLegCountSelector(){const cur=st.gameEntry?.legCount||GAME_ENTRY_DEFAULT_LEGS;return `<div class="section"><div class="card"><div class="card-title">LEGS</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0">${Array.from({length:8},(_,i)=>i+1).map(n=>`<button onclick="setGameEntryLegs(${n})" style="border:1px solid ${cur===n?'var(--accent)':'#334155'};background:${cur===n?'var(--accent)':'transparent'};color:${cur===n?'#07130b':'inherit'};border-radius:999px;padding:7px 12px;font-weight:900;cursor:pointer">${n}</button>`).join('')}</div><div style="font-size:var(--t-xs);color:var(--push)">Underdog Pick'em supports 2-8 legs. 1 leg is a straight bet (informational only).</div></div></div>`}
function renderEntry(entry){if(!entry)return '';if(!entry.candidates.length)return `<div class="section"><div class="card"><div class="card-title">${icon('entry')}ENTRY</div><div class="empty" style="padding:24px;text-align:center">No props available for this game yet.</div></div></div>`;if(!entry.legs.length)return `<div class="section"><div class="card"><div class="card-title">${icon('entry')}ENTRY</div><div class="empty" style="padding:24px;text-align:center">No usable odds for this game yet.</div></div></div>`;const odds=entry.math.american;const oddsText=odds>0?`+${odds}`:`${odds}`;const books=[...new Set(entry.legs.map(entryBestBookKey).filter(Boolean))];const warning=books.length>=2?`<div style="margin-top:12px;background:color-mix(in srgb, var(--warn) 8%, transparent);border:1px solid color-mix(in srgb, var(--warn) 33%, transparent);color:var(--warn);border-radius:8px;padding:8px;font-size:var(--t-xs)">${icon('warn')}Cross-book: legs split across ${books.join(', ')}. Single-book parlay may price differently.</div>`:'';const shortage=entry.legs.length<entry.requested?`<div style="margin-top:8px;color:var(--warn);font-size:var(--t-xs)">Only ${entry.legs.length} legs available (you requested ${entry.requested}).</div>`:'';return `<div class="section"><div class="card"><div class="card-title">${icon('entry')}ENTRY — ${esc(entry.game.label)} · ${entry.legs.length} legs</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0"><div class="stat-box"><div class="val">${oddsText}</div><div class="lbl">Combined</div></div><div class="stat-box"><div class="val">$${entry.math.return10.toFixed(0)}</div><div class="lbl">$10 return</div></div><div class="stat-box"><div class="val">${entry.score.toFixed(2)}</div><div class="lbl">Score</div></div></div>${shortage}<div style="height:1px;background:#334155;margin:12px 0"></div>${entry.legs.map((l,i)=>`<div style="padding:10px 0;border-bottom:1px solid #263238"><div style="display:flex;justify-content:space-between;gap:8px"><div style="font-weight:900">${i+1}. ${typeof playerLink==='function'?playerLink(l.player,l.prop_type,l.line):esc(l.player)} — ${l.prop_type} ${l.lean} ${l.line}</div><div style="font-weight:900;color:${l.lean==='OVER'?'var(--over)':'var(--under)'}">${entryFmtOdds(l.odds)}</div></div><div style="font-size:var(--t-xs);color:var(--push);margin-top:4px">Why: ${l.ai_tier} × ${l.prop_type} WLB ${l.wlb.toFixed(2)} = ${l.leg_score.toFixed(2)} · ${l.source}</div>${renderEntryBestBookLine(l.prop,l.lean)}</div>`).join('')}${warning}<button onclick="copyEntryToClipboard()" style="margin-top:14px;border:1px solid var(--accent);background:color-mix(in srgb, var(--accent) 13%, transparent);color:var(--accent);border-radius:8px;padding:10px 12px;font-weight:900;cursor:pointer;width:100%">${window.__entryCopied?'✓ Copied':'Copy entry'}</button></div></div>`}
function renderGameEntryView(){st.gameEntry=st.gameEntry||{selectedGame:null,legCount:GAME_ENTRY_DEFAULT_LEGS,entry:null};const games=getEntryGames();let html=renderGameSelector(games);if(st.gameEntry.selectedGame){html+=renderLegCountSelector();html+=renderEntry(buildGameEntry())}return html}
function entryCopyText(entry){const odds=entry.math.american;const oddsText=odds>0?`+${odds}`:`${odds}`;return `${entry.game.label} — ${entry.legs.length}-leg entry\n${entry.legs.map((l,i)=>`${i+1}. ${l.player} - ${l.prop_type} ${l.lean} ${l.line}`).join('\n')}\nCombined ${oddsText} | $10 → $${entry.math.return10.toFixed(0)}\nBuilt: ${new Date().toLocaleString()}`}
function copyEntryToClipboard(){const entry=buildGameEntry();if(!entry)return;const text=entryCopyText(entry);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{window.__entryCopied=true;render();setTimeout(()=>{window.__entryCopied=false;render()},1200)}).catch(()=>entryShowCopyFallback(text))}else entryShowCopyFallback(text)}
function entryShowCopyFallback(text){window.__entryCopied=false;const box=document.createElement('textarea');box.value=text;box.style.position='fixed';box.style.left='10px';box.style.bottom='10px';box.style.width='320px';box.style.height='160px';box.style.zIndex='9999';document.body.appendChild(box);box.focus();box.select()}

function setStatsTimeWindow(w){st.statsTimeWindow=w;render()}
function statField(row,name){return row?.[name]??row?.[name.toLowerCase()]??row?.[name.toUpperCase()]??''}
function statNum(row,name){return toNum(statField(row,name))}
function statBool(row,name){const v=String(statField(row,name)).trim().toUpperCase();return v==='TRUE'||v==='YES'||v==='1'}
function statPct(v){const n=Number(v);return Number.isFinite(n)?(n*100).toFixed(1)+'%':'—'}
function statPct0(v){const n=Number(v);return Number.isFinite(n)?Math.round(n*100)+'%':'—'}
function statSigned(v){const n=Number(v);if(!Number.isFinite(n))return '—';return (n>0?'+':'')+n.toFixed(3)}
function statsRowsForWindow(rows,w){return (rows||[]).filter(r=>String(statField(r,'TIME_WINDOW'))===w)}
function getMetricsForSlice(rows,dimType,dimValue,timeWindow){return (rows||[]).find(r=>String(statField(r,'DIMENSION_TYPE'))===dimType&&String(statField(r,'DIMENSION_VALUE'))===String(dimValue)&&String(statField(r,'TIME_WINDOW'))===timeWindow)||null}
function statsWindowLabel(w){return (STATS_WINDOWS.find(x=>x[0]===w)||[])[1]||w}
function renderTimeWindowSelector(currentWindow){return `<div class="stats-strip" style="position:sticky;top:0;z-index:5;display:flex;gap:6px">${STATS_WINDOWS.map(([w,l])=>`<button class="tab-btn ${currentWindow===w?'active':''}" onclick="setStatsTimeWindow('${w}')" style="white-space:nowrap;${currentWindow===w?'background:var(--accent);color:#07110b;border-color:var(--accent);':''}">${l}</button>`).join('')}</div>`}
function detectDrifts(rows,threshold=0.10){const all=(rows||[]).filter(r=>String(statField(r,'TIME_WINDOW'))==='all_time'&&statBool(r,'MIN_SAMPLE_FLAG'));const recent=(rows||[]).filter(r=>String(statField(r,'TIME_WINDOW'))==='last_30d'&&statBool(r,'MIN_SAMPLE_FLAG'));const map=new Map(all.map(r=>[`${statField(r,'DIMENSION_TYPE')}|${statField(r,'DIMENSION_VALUE')}`,r]));return recent.map(r=>{const key=`${statField(r,'DIMENSION_TYPE')}|${statField(r,'DIMENSION_VALUE')}`;const base=map.get(key);if(!base)return null;const hr30=statNum(r,'HIT_RATE'),hrAll=statNum(base,'HIT_RATE');const delta=hr30-hrAll;if(!Number.isFinite(delta)||Math.abs(delta)<threshold)return null;return{dimension_type:statField(r,'DIMENSION_TYPE'),dimension_value:statField(r,'DIMENSION_VALUE'),hit_rate_last_30d:hr30,hit_rate_all_time:hrAll,delta,n:statNum(r,'N_PICKS_DECISIVE')}}).filter(Boolean).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta))}
function renderDriftAlerts(rows){const drifts=detectDrifts(rows);if(!drifts.length)return '';const shown=drifts.slice(0,5);return `<div style="padding:0 16px 8px"><div style="color:var(--warn);font-size:var(--t-sm);font-weight:800;margin-bottom:6px">Drift Alerts</div>${shown.map(d=>`<div class="card" style="border-color:var(--warn-line);margin-bottom:6px"><div style="font-size:var(--t-sm);color:var(--warn);font-weight:800">⚠️ DRIFT — ${esc(String(d.dimension_value||d.dimension_type))}</div><div style="font-size:var(--t-xs);color:var(--ink-1);margin-top:4px">last 30d ${statPct(d.hit_rate_last_30d)} vs all-time ${statPct(d.hit_rate_all_time)} (${d.delta>0?'+':''}${Math.round(d.delta*100)}pp on n=${Math.round(d.n)})</div></div>`).join('')}${drifts.length>5?`<div style="color:var(--push);font-size:var(--t-xs);padding:2px 4px">... and ${drifts.length-5} more</div>`:''}</div>`}
function renderOverallCard(rows,w){const r=getMetricsForSlice(rows,'overall','',w);if(!r)return `<div class="empty">No overall stats for ${statsWindowLabel(w)}.</div>`;const low=!statBool(r,'MIN_SAMPLE_FLAG');return `<div class="card" style="margin:0 16px 10px;border-color:color-mix(in srgb, var(--accent) 27%, transparent)"><div class="card-title">OVERALL — ${statsWindowLabel(w)} ${low?'<span style="font-size:var(--t-xs);color:var(--warn)">(low sample)</span>':''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end"><div><div style="font-size:34px;font-weight:900;color:var(--accent)">${statPct(statNum(r,'HIT_RATE'))}</div><div style="font-size:var(--t-xs);color:var(--push)">Push-adjusted hit rate</div><div style="font-size:var(--t-sm);color:var(--ink-1);margin-top:6px">${Math.round(statNum(r,'N_PICKS_DECISIVE'))} decisive / ${Math.round(statNum(r,'N_PICKS'))} picks</div></div><div style="text-align:right"><div style="font-size:var(--t-lg);font-weight:800;color:${statNum(r,'ROI_PER_PICK')>=0?'var(--over)':'var(--under)'}">ROI/pick ${statSigned(statNum(r,'ROI_PER_PICK'))}</div><div style="font-size:var(--t-xs);color:var(--push)">Flat -115 model</div></div></div></div>`}

function getBestBookForLean(prop,lean){if(!prop)return null;const side=String(lean||"OVER").toUpperCase()==="UNDER"?"UNDER":"OVER";const book=mbField(prop,`BEST_${side}_BOOK`);const odds=mbField(prop,`BEST_${side}_ODDS`);if(!book||odds==="")return null;const deltaRaw=mbField(prop,`BEST_${side}_DELTA_PP`);const delta=Number(deltaRaw);return {side,book:String(book),odds,delta:Number.isFinite(delta)?delta:null,isDK:String(book).toLowerCase()==="draftkings"}}

function renderSoftLinePill(prop){const result=evaluateSoftLineForProp(prop);if(!result||(!result.over&&!result.under))return "";const side=result.over&&result.under?'BOTH':result.over?'OVER':'UNDER';const open=window.__softLineOpen===result.key;return `<span onclick="event.stopPropagation();window.__softLineOpen=${open?'null':JSON.stringify(result.key)};render()" class="soft-line-pill" title="Tap for soft DK math" style="display:inline-flex;align-items:center;border:1px solid color-mix(in srgb, var(--warn) 47%, transparent);background:var(--warn-soft);color:var(--warn);border-radius:999px;padding:2px 7px;font-size:var(--t-xs);font-weight:900;white-space:nowrap;cursor:pointer">🚨 Soft DK (${side})</span>${open?renderSoftLineTooltip(result):""}`}
