<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MLB DFS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f291a;color:#fff;font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;padding-bottom:60px}
select,input{background:#1a3d2a;color:#fff;border:1px solid #2d5a3d;border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
input::placeholder{color:#6b8f7b}
.header{background:#163024;padding:12px 16px;border-bottom:1px solid #2d5a3d;position:sticky;top:0;z-index:10}
.header-title{color:#4ade80;font-weight:700;font-size:13px;margin-bottom:8px}
.row{display:flex;gap:8px;margin-top:8px}
.row select,.row input{flex:1}
.section{padding:14px 16px 0}
.label{color:#86efac;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card{background:#163024;border-radius:10px;padding:12px 14px}
.card-title{color:#4ade80;font-weight:700;font-size:13px;margin-bottom:8px}
.stats-strip{background:#163024;padding:10px 16px;border-bottom:1px solid #1a3d2a;overflow-x:auto}
.stats-strip-inner{display:flex;gap:16px;min-width:max-content}
.stat-item{text-align:center;min-width:40px}
.stat-label{color:#86efac;font-size:9px;margin-bottom:2px;font-weight:600}
.stat-val{color:#4ade80;font-weight:700;font-size:13px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-val{font-size:7px;color:#e5e7eb;margin-bottom:1px;font-weight:600}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s,background .3s}
.bar-date{font-size:7px;color:#86efac;margin-top:2px}
.line-indicator{border-top:1px dashed #4ade80;margin-top:2px;padding-top:2px;font-size:9px;color:#4ade80}
.avg-cards{display:flex;gap:8px}
.avg-card{flex:1;background:#163024;border-radius:8px;padding:10px 4px;text-align:center}
.avg-label{color:#86efac;font-size:9px;margin-bottom:4px}
.avg-val{font-weight:700;font-size:15px}
.split-row{display:flex;gap:8px}
.split-card{flex:1;background:#163024;border-radius:10px;padding:12px}
.split-title{color:#e5e7eb;font-size:10px;font-weight:600;margin-bottom:8px;display:block}
.mini-bars-container{position:relative;height:70px;display:flex;gap:6px;align-items:flex-end}
.mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.mini-bar{width:100%;border-radius:3px 3px 0 0;flex-shrink:0}
.mini-bar-label{font-size:8px;color:#86efac;margin-top:2px}
.mini-bar-val{font-size:8px;color:#fff;font-weight:600;margin-top:1px}
.matchup-card{background:#163024;border-radius:10px;padding:12px 14px}
.matchup-header{color:#4ade80;font-weight:700;font-size:14px;margin-bottom:6px}
.matchup-sub{color:#86efac;font-size:11px;margin-bottom:8px}
.matchup-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.matchup-stat{text-align:center}
.matchup-stat .val{font-weight:700;font-size:14px;color:#fff}
.matchup-stat .lbl{font-size:9px;color:#86efac}
.weather-card{background:#163024;border-radius:10px;padding:12px 14px}
.weather-row{display:flex;justify-content:space-between;margin-bottom:4px}
.weather-key{color:#86efac;font-size:12px}
.weather-val{color:#fff;font-size:12px;font-weight:600}
.hit-row{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #2d5a3d}
.hit-key{color:#86efac;font-size:12px}
.hit-val{color:#fff;font-size:12px;font-weight:600}
.timestamp{text-align:center;padding:16px;color:#4a7a5a;font-size:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.error{padding:24px;color:#ef4444;font-size:14px}
.no-data{color:#6b8f7b;font-size:11px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#163024;border-top:1px solid #2d5a3d;display:flex;z-index:20}
.tab-btn{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:600;color:#6b8f7b;cursor:pointer;border:none;background:none}
.tab-btn.active{color:#4ade80;border-top:2px solid #4ade80}
.page{display:none}
.page.active{display:block}
.log-controls{padding:12px 16px}
.log-table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);padding:0 16px 80px}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
thead{position:sticky;top:0;z-index:5}
th{background:#163024;color:#4ade80;font-weight:700;padding:6px 4px;text-align:center;border-bottom:1px solid #2d5a3d;white-space:nowrap}
th.hl{background:#1a3d2a}
td{padding:5px 4px;text-align:center;color:#e5e7eb;border-bottom:1px solid #1a3d2a;white-space:nowrap}
td.hl{color:#4ade80;font-weight:700}
td.hit{color:#22c55e;font-weight:700}
td.miss{color:#ef4444;font-weight:700}
td.push{color:#9ca3af;font-weight:700}
.early-banner{background:#1a3d2a;border:1px solid #2d5a3d;border-radius:10px;padding:14px;margin:14px 16px 0;text-align:center}
.early-banner .icon{font-size:20px;margin-bottom:4px}
.early-banner .msg{color:#86efac;font-size:12px;font-weight:600}
.early-banner .sub{color:#6b8f7b;font-size:11px;margin-top:4px}
.prop-card{background:#163024;border:1px solid #2d5a3d;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.prop-left{display:flex;align-items:center;gap:10px}
.prop-metric{background:#1a3d2a;border:1px solid #2d5a3d;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:#4ade80;min-width:32px;text-align:center}
.prop-line{font-size:16px;font-weight:700;color:#fff}
.prop-right{text-align:right}
.prop-odds{font-size:11px;font-weight:600}
.prop-over{color:#22c55e}
.prop-under{color:#ef4444}
.pick-card{background:#163024;border-radius:10px;padding:12px 14px;margin:0 16px 10px;border-left:3px solid #2d5a3d;transition:transform .15s,box-shadow .15s}
.pick-card.smash{border-left-color:#22c55e;background:#16302a}
.pick-card.strong{border-left-color:#3b82f6}
.pick-rank{display:inline-block;background:#1a3d2a;color:#4ade80;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:6px}
.pick-player{font-weight:700;font-size:14px}
.pick-matchup{color:#86efac;font-size:11px;margin-top:2px}
.pick-prop{display:flex;align-items:center;gap:8px;margin-top:8px}
.pick-type{background:#1a3d2a;border:1px solid #2d5a3d;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:#4ade80}
.pick-lean{font-size:14px;font-weight:700}
.pick-lean.over{color:#22c55e}
.pick-lean.under{color:#ef4444}
.pick-conf{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;margin-left:auto}
.pick-conf.smash{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.pick-conf.strong{background:#3b82f622;color:#3b82f6;border:1px solid #3b82f644}
.pick-conf.lean{background:#f5972622;color:#f59726;border:1px solid #f5972644}
.pick-rationale{color:#9ca3af;font-size:11px;margin-top:6px;font-style:italic}
.pick-result{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid #2d5a3d}
.result-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.result-hit{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.result-miss{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.result-push{background:#9ca3af22;color:#9ca3af;border:1px solid #9ca3af44}
.result-actual{color:#86efac;font-size:11px}
.props-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
.pf-btn{padding:6px 12px;font-size:11px;font-weight:600;color:#6b8f7b;background:#1a3d2a;border:1px solid #2d5a3d;border-radius:16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pf-btn.active{color:#4ade80;background:#24503a;border-color:#4ade80}
.props-tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:50vh;padding:0 16px 16px}
.props-tbl-wrap table{min-width:420px}
.odds-over{color:#22c55e;font-weight:600}
.odds-under{color:#ef4444;font-weight:600}
.odds-even{color:#f59726;font-weight:600}
.search-wrap{position:relative}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#1a3d2a;border:1px solid #2d5a3d;border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:20;display:none}
.sug-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #24503a;font-size:13px}
.sug-item:hover,.sug-item:active{background:#24503a}
.sug-name{font-weight:600;color:#fff}
.sug-meta{color:#6b8f7b;font-size:11px;margin-top:2px}
.profile{display:flex;align-items:center;gap:14px;padding:14px 16px}
.profile-info h2{font-size:18px;font-weight:700}
.profile-info p{font-size:12px;color:#86efac;margin-top:2px}
.profile-img{width:64px;height:64px;border-radius:50%;background:#1a3d2a;overflow:hidden}
.profile-img img{width:100%;height:100%}
.sub-tabs{display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.sub-tab{padding:8px 14px;font-size:12px;font-weight:600;color:#6b8f7b;background:#1a3d2a;border:1px solid #2d5a3d;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-tab.active{color:#4ade80;background:#24503a;border-color:#4ade80}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 16px 8px}
.stat-box{background:#1a3d2a;border-radius:8px;padding:8px 4px;text-align:center}
.stat-box .val{font-weight:700;font-size:16px;color:#4ade80}
.stat-box .lbl{font-size:9px;color:#86efac;margin-top:2px}
.lk-tbl-wrap{overflow-x:auto;padding:0 16px 16px}
.lk-section{padding:14px 16px 0}
.empty{color:#6b8f7b;font-size:12px;padding:20px;text-align:center}
.loading-sm{color:#6b8f7b;font-size:12px;padding:20px;text-align:center}
.picks-summary{display:flex;gap:8px;padding:0 16px 8px}
.ps-card{flex:1;background:#163024;border-radius:8px;padding:10px;text-align:center}
.ps-val{font-size:18px;font-weight:800;color:#4ade80}
.ps-lbl{font-size:9px;color:#86efac;margin-top:2px}
.dinger-card{background:#163024;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #f59726;display:flex;align-items:center;justify-content:space-between;transition:transform .15s,box-shadow .15s}
.dinger-card.top3{border-left-color:#ef4444;background:#1a2024}
.dinger-left{flex:1}
.dinger-rank{display:inline-block;background:#1a3d2a;color:#f59726;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;margin-right:6px;min-width:20px;text-align:center}
.dinger-card.top3 .dinger-rank{color:#ef4444;background:#2a1a1a}
.dinger-name{font-weight:700;font-size:14px}
.dinger-meta{color:#86efac;font-size:11px;margin-top:2px}
.dinger-right{text-align:right;min-width:80px}
.dinger-rate{font-size:16px;font-weight:800;color:#f59726}
.dinger-card.top3 .dinger-rate{color:#ef4444}
.dinger-sub{font-size:9px;color:#6b8f7b;margin-top:1px}
.dinger-odds{font-size:11px;font-weight:600;color:#86efac;margin-top:2px}
.dinger-header{padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center}
.dinger-title{color:#f59726;font-size:13px;font-weight:700}
.dinger-desc{color:#6b8f7b;font-size:10px;padding:0 16px 8px}
.combo-section{padding:12px 16px 0}
.combo-title{color:#4ade80;font-size:12px;font-weight:700;margin-bottom:8px}
.combo-card{background:#163024;border-radius:10px;padding:10px 14px;margin-bottom:6px;border-left:3px solid #f59726}
.combo-card.best{border-left-color:#ef4444;background:#1a2024}
.combo-rank{display:inline-block;background:#1a3d2a;color:#f59726;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;margin-right:4px}
.combo-card.best .combo-rank{color:#ef4444;background:#2a1a1a}
.combo-players{font-weight:700;font-size:13px;display:inline}
.combo-teams{color:#86efac;font-size:10px;margin-top:2px}
.combo-score{float:right;font-size:12px;font-weight:700;color:#f59726}
.combo-card.best .combo-score{color:#ef4444}
/* ── Streaks ── */
.streak-card{background:#163024;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #ffd966;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:transform .15s,box-shadow .15s}
.streak-card.fire{border-left-color:#ff6b35}.streak-card.inferno{border-left-color:#ef4444}.streak-card.hot{border-left-color:#ffaa00}
.streak-left{flex:1}
.streak-emoji{font-size:14px;margin-right:4px}
.streak-name{font-weight:700;font-size:14px}
.streak-label{font-size:10px;font-weight:600;color:#ffaa00;margin-left:6px}
.streak-meta{color:#86efac;font-size:11px;margin-top:2px}
.streak-right{text-align:right;min-width:55px}
.streak-count{font-size:22px;font-weight:800;color:#ffaa00}
.streak-card.fire .streak-count{color:#ff6b35}.streak-card.inferno .streak-count{color:#ef4444}
.streak-sub{font-size:9px;color:#6b8f7b;margin-top:1px}
.streak-chart{display:flex;gap:2px;align-items:flex-end;height:28px;margin-top:6px}
.streak-chart-bar{width:8px;border-radius:2px 2px 0 0;min-height:3px}
.streak-prop{font-size:10px;color:#86efac;margin-top:4px}
.streak-filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
/* ── Draft ── */
.draft-card{background:#163024;border-radius:10px;padding:10px 14px;margin:0 16px 6px;border-left:3px solid #2d5a3d;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s}
.draft-card:active{transform:scale(.98)}
.draft-card.drafted{opacity:.3;text-decoration:line-through}
.draft-card.smash{border-left-color:#22c55e}
.draft-card.tier1{border-left-color:#4ade80}
.draft-card.tier2{border-left-color:#3b82f6}
.draft-card.tier3{border-left-color:#8b5cf6}
.draft-card.pitcher{border-left-color:#06b6d4}
.draft-rank{font-size:16px;font-weight:800;min-width:24px;text-align:center}
.draft-main{flex:1;min-width:0}
.draft-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-meta{color:#86efac;font-size:10px;margin-top:2px}
.draft-fp{text-align:right;min-width:50px}
.draft-fp-val{font-size:18px;font-weight:800}
.draft-fp-lbl{font-size:8px;color:#6b8f7b}
.draft-pos{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px}
.draft-pos-p{background:#06b6d422;color:#06b6d4;border:1px solid #06b6d444}
.draft-pos-if{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.draft-pos-of{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.draft-pos-flex{background:#8b5cf622;color:#8b5cf6;border:1px solid #8b5cf644}
.draft-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;margin-right:4px;display:inline-block;margin-top:3px}
.draft-tags{margin-top:2px}
.draft-tier-label{padding:8px 16px 4px;font-size:11px;font-weight:700}
.draft-controls{display:flex;justify-content:space-between;align-items:center;padding:6px 16px}
.draft-reset{background:#1a3d2a;border:1px solid #2d5a3d;color:#6b8f7b;font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer}
.draft-count{color:#6b8f7b;font-size:10px}
/* ═══ +EV Badges & Best Bets ═══ */
.ev-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px}
.ev-pos{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.ev-neg{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.ev-neutral{background:#f5972622;color:#f59726;border:1px solid #f5972644}
.ev-big{font-size:10px;padding:3px 8px}
.bet-card{background:#163024;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #22c55e;display:flex;align-items:center;justify-content:space-between;transition:transform .15s,box-shadow .15s}
.bet-card.elite{border-left-color:#ef4444;background:#1a2024}
.bet-card.strong{border-left-color:#4ade80}
.bet-card.mid{border-left-color:#f59726}
.bet-left{flex:1}
.bet-name{font-weight:700;font-size:14px}
.bet-meta{color:#86efac;font-size:11px;margin-top:2px}
.bet-prop{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.bet-right{text-align:right;min-width:70px}
.bet-edge{font-size:20px;font-weight:800}
.bet-edge.pos{color:#22c55e}
.bet-edge.neg{color:#ef4444}
.bet-sub{font-size:9px;color:#6b8f7b;margin-top:1px}
.bet-bar{height:4px;border-radius:2px;margin-top:6px;background:#1a3d2a;overflow:hidden}
.bet-bar-fill{height:100%;border-radius:2px}
.bet-summary{display:flex;gap:8px;padding:0 16px 8px}
.bs-card{flex:1;background:#163024;border-radius:8px;padding:10px;text-align:center}
.bs-val{font-size:18px;font-weight:800;color:#22c55e}
.bs-lbl{font-size:9px;color:#86efac;margin-top:2px}
/* ═══ Smart Slips ═══ */
.slip-section{padding:12px 16px 0}
.slip-tier{color:#4ade80;font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.slip-tier .payout{font-size:11px;color:#86efac;font-weight:600}
.slip-card{background:#163024;border-radius:10px;padding:14px;margin:0 16px 10px;border-left:3px solid #4ade80;transition:transform .15s,box-shadow .15s}
.slip-card.best{border-left-color:#22c55e;background:#16302a}
.slip-card.aggressive{border-left-color:#f59726}
.slip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slip-rank{font-size:11px;font-weight:700;color:#4ade80;background:#1a3d2a;padding:2px 8px;border-radius:4px}
.slip-score{font-size:13px;font-weight:800;color:#4ade80}
.slip-legs{display:flex;flex-direction:column;gap:6px}
.slip-leg{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1a3d2a;border-radius:6px}
.slip-leg-name{font-weight:600;font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slip-leg-prop{display:flex;align-items:center;gap:6px;flex-shrink:0}
.slip-leg-metric{font-size:10px;font-weight:700;color:#4ade80;background:#0f291a;padding:2px 5px;border-radius:3px}
.slip-leg-lean{font-size:11px;font-weight:700}
.slip-leg-lean.over{color:#22c55e}
.slip-leg-lean.under{color:#ef4444}
.slip-leg-edge{font-size:9px;font-weight:600;color:#86efac}
.slip-leg-team{font-size:9px;color:#6b8f7b;min-width:28px;text-align:center}
.slip-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.slip-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.slip-meta{color:#6b8f7b;font-size:10px;margin-top:6px;display:flex;justify-content:space-between}
.slip-controls{display:flex;gap:8px;padding:8px 16px;align-items:center;flex-wrap:wrap}
.slip-controls .pf-btn{font-size:11px}
/* ═══ They're Due ═══ */

<div id="app"><div class="loading"><div style="font-size:32px;animation:bounce .8s ease-in-out infinite">⚾</div><div style="color:#6b8f7b;font-size:14px">Loading dashboard...</div></div></div>
<script>
const SHEET_ID="1AAwSwFCGIqS6JGdYTdkSau91BtnM_sMdWl2By5A9nFQ";
const METRICS=["H","HR","RBI","R","SB","SO","BB","TB","2B","DK_FP","H+R+RBI"];
const P_METRICS=["IP","SO","ER","H","HR","BB","DK_FP","PC","W","L"];
const MLB_API="https://statsapi.mlb.com/api/v1";

let st={
  tonight:[],gameLogs:[],splits:[],weather:[],pitchers:[],schedule:[],
  pTonight:[],pGameLogs:[],pSplits:[],
  picks:[],props:[],
  mode:"batter",
  player:"",metric:"H",line:"",activeTab:"dashboard",oppFilter:"",
  playerSearch:"",playerSuggestions:[],showPlayerSugs:false,
  loading:true,error:null,
  picksView:"picks",propsMetric:"ALL",propsSearch:"",
  streakFilter:"all",dueFilter:"all",drafted:new Set(),slipLegs:"3",
  lkPlayer:null,lkResults:[],lkSubTab:"career",lkPlayerType:"batter",
  lkCareer:null,lkYby:null,lkVsTeamStats:null,lkVsPlayerId:null,
  lkVsPlayerName:"",lkVsPlayerResults:[],lkVsPlayerStats:null,
  lkVsTeamId:null,lkLoading:{},lkTeamList:[]
};

function cleanRows(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const ck=k.replace(/^\uFEFF/,'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
      clean[ck]=v;
    }
    return clean;
  });
}

function normalizeKeys(rows){
  if(!rows||!rows.length)return rows;
  const firstKeys=Object.keys(rows[0]);
  const hasSpaceKeys=firstKeys.some(k=>k.includes(' '));
  if(!hasSpaceKeys)return rows;
  console.log("🔧 Normalizing dirty column names:",firstKeys.slice(0,3).map(k=>k.slice(0,30)+"...").join(" | "));
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const baseKey=k.split(' ')[0];
      clean[baseKey]=v;
    }
    return clean;
  });
}

const fetchSheet=(name)=>new Promise((res,rej)=>{
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${encodeURIComponent(name)}`;
  fetch(url)
  .then(r=>{
    if(!r.ok){console.error(`❌ Sheet fetch failed: ${name} (${r.status})`);throw new Error(`Failed: ${name}`)}
    return r.text()
  })
  .then(text=>{
    Papa.parse(text,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>{
      console.log(`✅ ${name}: ${r.data.length} rows, cols: ${r.meta.fields?.slice(0,5).join(', ')}...`);
      res(r.data);
    },error:e=>{console.error(`❌ Parse error: ${name}`,e);rej(e)}});
  })
  .catch(e=>{console.error(`❌ Fetch error: ${name}`,e);rej(e)});
});

const toNum=v=>parseFloat(v)||0;
const barColor=(v,l)=>!l?"#4ade80":v>l?"#22c55e":"#ef4444";
const avgColor=(v,l)=>!l?"#4ade80":v>=l?"#4ade80":"#f97316";
const esc=s=>{if(!s)return"";return String(s).replace(/[&<>'"]/g,t=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[t]))};
const fmtOdds=v=>{if(!v&&v!==0)return"—";v=parseInt(v);return v>0?`+${v}`:`${v}`};

const COMBO_STATS={
  "H+R+RBI":["H","R","RBI"],
  "H+R":["H","R"],
  "R+RBI":["R","RBI"],
  "H+RBI":["H","RBI"],
  "1B+2B":["1B","2B"],
  "BB+H":["BB","H"],
};

function getMetricVal(g,m){
  if(COMBO_STATS[m])return COMBO_STATS[m].reduce((s,k)=>s+toNum(g[k]),0);
  return toNum(g[m]);
}
function getRollingVal(row,prefix,m){
  if(COMBO_STATS[m])return COMBO_STATS[m].reduce((s,k)=>s+toNum(row[`${prefix}${k}`]),0);
  return toNum(row[`${prefix}${m}`]);
}

function hasLogs(name,isP){return(isP?st.pGameLogs:st.gameLogs).some(g=>g.player_name===name)}
function getProps(name){if(!name||!st.props.length)return[];const n=name.toLowerCase();return st.props.filter(p=>(p.PLAYER_NAME||"").toLowerCase()===n)}
function getPick(name){if(!name||!st.picks.length)return null;const n=name.toLowerCase();return st.picks.find(p=>(p.player||"").toLowerCase()===n)||null}

function firstValidPlayer(arr){
  if(!arr||!arr.length)return "";
  for(let i=0;i<Math.min(arr.length,30);i++){
    const row=arr[i];if(!row)continue;
    const n=row.player_name;
    if(n&&String(n).trim().length>1)return String(n).trim();
  }
  const first=arr[0];if(!first)return "";
  const key=Object.keys(first).find(k=>k.replace(/[^a-zA-Z_]/g,'').toLowerCase()==="player_name"||k.includes("player_name"));
  if(key){
    for(let i=0;i<Math.min(arr.length,30);i++){
      const v=arr[i]?.[key];
      if(v&&String(v).trim().length>1)return String(v).trim();
    }
  }
  console.warn("⚠️ Could not find player_name. Keys:",Object.keys(first).slice(0,5));
  return "";
}

let _restoring=false;
function saveFocus(){const el=document.activeElement;if(el&&el.id)return{id:el.id,pos:el.selectionStart,val:el.value};return null}
function restoreFocus(f){if(!f)return;const el=document.getElementById(f.id);if(el){_restoring=true;el.focus();if(f.val!==undefined)el.value=f.val;if(el.setSelectionRange&&f.pos!==undefined)try{el.setSelectionRange(f.pos,f.pos)}catch(e){}_restoring=false}}

let useProxy=false;
async function mlbFetch(url){
  try{const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json()}
  catch(e){if(!useProxy){useProxy=true;return(await fetch("https://corsproxy.io/?"+encodeURIComponent(url))).json()}throw e}
}

function switchTab(t){st.activeTab=t;render()}
function switchMode(m){
  st.mode=m;
  st.metric=m==="pitcher"?"SO":"H";
  st.line="";st.oppFilter="";st.playerSearch="";st.playerSuggestions=[];st.showPlayerSugs=false;
  const src=m==="pitcher"?st.pTonight:st.tonight;
  st.player=firstValidPlayer(src);
  console.log(`Mode → ${m}, default player: "${st.player}", source has ${src.length} entries`);
  render();
}
function switchPicksView(v){st.picksView=v;render()}
function setPropsMetric(m){st.propsMetric=m;render()}
function setDueFilter(f){st.dueFilter=f;render()}

function getDingerCombos(board,legs){
  if(board.length<legs)return[];
  const combos=[];
  function gen(start,current){
    if(current.length===legs){
      const teams=current.map(d=>d.team);
      if(new Set(teams).size===legs){
        const score=current.reduce((s,d)=>s+d.score,0);
        combos.push({players:current.slice(),score,teams});
      }
      return;
    }
    for(let i=start;i<board.length&&combos.length<500;i++){
      current.push(board[i]);
      gen(i+1,current);
      current.pop();
    }
  }
  gen(0,[]);
  combos.sort((a,b)=>b.score-a.score);
  return combos.slice(0,10);
}

function getDingerBoard(){
  const rows=[];
  for(const p of st.tonight){
    const name=p.player_name;if(!name)continue;
    const seasHR=toNum(p.Seas_HR);
    const l7HR=toNum(p.L7_HR);
    const l14HR=toNum(p.L14_HR);
    const pLogs=st.gameLogs.filter(g=>g.player_name===name);
    if(!pLogs.length)continue;
    const totalAB=pLogs.reduce((s,g)=>s+toNum(g.AB),0);
    if(totalAB===0)continue;
    const seasHRtotal=pLogs.reduce((s,g)=>s+toNum(g.HR),0);
    const hrRate=totalAB>0?seasHRtotal/totalAB:0;
    const gamesPlayed=pLogs.length;
    const hrPerGame=gamesPlayed>0?seasHRtotal/gamesPlayed:0;
    const hrProp=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC==="HR");
    const dkLine=hrProp?hrProp.DK_LINE:null;
    const overOdds=hrProp?parseInt(hrProp.OVER_ODDS)||null:null;
    let score=0;
    score+=hrRate*100;
    score+=l7HR*15;
    score+=l14HR*8;
    score+=seasHR*5;
    score+=hrPerGame*20;
    if(overOdds&&overOdds<0)score+=10;
    if(overOdds&&overOdds>0&&overOdds<=200)score+=5;
    rows.push({
      name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:p.opp_pitcher_name||"TBD",
      hand:p.opp_pitcher_hand||"?",venue:p.venue_tonight||"",
      seasHR:seasHRtotal,totalAB,hrRate,hrPerGame,gamesPlayed,
      l7HR,l14HR,seasAvgHR:seasHR,
      dkLine,overOdds,score
    });
  }
  rows.sort((a,b)=>b.score-a.score);
  return rows.slice(0,30);
}

// ═══ +EV ENGINE ═══
function impliedProb(odds){
  if(!odds&&odds!==0)return null;
  const o=parseInt(odds);if(isNaN(o))return null;
  return o<0?Math.abs(o)/(Math.abs(o)+100):100/(o+100);
}

function getHitRate(name,metric,line,isP){
  const logs=(isP?st.pGameLogs:st.gameLogs).filter(g=>g.player_name===name);
  if(logs.length<3)return null;
  const ln=parseFloat(line);if(isNaN(ln))return null;
  const combo=COMBO_STATS[metric];
  const hits=combo
    ?logs.filter(g=>combo.reduce((s,k)=>s+toNum(g[k]),0)>ln).length
    :logs.filter(g=>toNum(g[metric])>ln).length;
  return{rate:hits/logs.length,hits,total:logs.length};
}

function propToLogCol(metric){
  if(COMBO_STATS[metric])return metric;
  const map={H:"H",TB:"TB",HR:"HR",RBI:"RBI",R:"R",SB:"SB",BB:"BB","1B":"1B","2B":"2B",Batter_SO:"SO",P_SO:"SO",P_H:"H",P_BB:"BB",P_ER:"ER",P_OUTS:"IP"};
  return map[metric]||metric;
}

function isPitcherProp(metric){return(metric||"").startsWith("P_")}

function getBestBets(){
  if(!st.props.length)return[];
  const bets=[];
  for(const p of st.props){
    const name=p.PLAYER_NAME;if(!name)continue;
    const metric=p.METRIC;
    const line=parseFloat(p.DK_LINE);if(isNaN(line))continue;
    const overOdds=parseInt(p.OVER_ODDS);
    const underOdds=parseInt(p.UNDER_ODDS);
    if(isNaN(overOdds)&&isNaN(underOdds))continue;

    const logCol=propToLogCol(metric);
    const isP=isPitcherProp(metric);
    const hr=getHitRate(name,logCol,line,isP);
    if(!hr||hr.total<3)continue;

    const overIP=impliedProb(overOdds);
    const underIP=impliedProb(underOdds);

    let overEdge=null,underEdge=null;
    if(overIP!==null)overEdge=hr.rate-overIP;
    if(underIP!==null)underEdge=(1-hr.rate)-underIP;

    let lean,edge,odds,ip,hitRate;
    if(overEdge!==null&&underEdge!==null){
      if(overEdge>=underEdge){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.rate}
      else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=1-hr.rate}
    }else if(overEdge!==null){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.rate}
    else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=1-hr.rate}

    if(edge===null)continue;

    const pT=st.tonight.find(t=>(t.player_name||"").toLowerCase()===name.toLowerCase())||
             st.pTonight.find(t=>(t.player_name||"").toLowerCase()===name.toLowerCase())||{};

    bets.push({
      name,metric,line,lean,edge,odds,
      impliedProb:ip,hitRate,
      hits:lean==="OVER"?hr.hits:hr.total-hr.hits,
      total:hr.total,
      team:pT.team_abbr||"",
      opp:pT.opp_abbr_tonight||"",
      pitcher:pT.opp_pitcher_name||"",
      hand:pT.opp_pitcher_hand||"",
      dkLine:p.DK_LINE,
      overOdds:p.OVER_ODDS,
      underOdds:p.UNDER_ODDS,
      isP
    });
  }
  bets.sort((a,b)=>b.edge-a.edge);
  return bets;
}

// ═══ SMART SLIP GENERATOR ═══
function getConvictionLegs(){
  const bets=getBestBets().filter(b=>b.edge>0);
  if(!bets.length)return[];

  const aiMap=new Map();
  st.picks.forEach(pk=>{if(pk.player)aiMap.set(pk.player.toLowerCase(),pk)});
  const streakMap=new Map();
  try{
    const streaks=getStreaks();
    streaks.forEach(s=>{const k=`${s.player.toLowerCase()}|${s.stat}`;streakMap.set(k,s)});
  }catch(e){}

  const legs=[];
  for(const b of bets){
    const nl=b.name.toLowerCase();
    const evScore=Math.min(b.edge*40,10);
    let aiScore=0;
    const aiPick=aiMap.get(nl);
    if(aiPick){
      const conf=(aiPick.confidence||"").toUpperCase();
      if(conf==="SMASH")aiScore=4;
      else if(conf==="STRONG")aiScore=2.5;
      else aiScore=1;
      if((aiPick.prop_type||"").toUpperCase()===b.metric.toUpperCase())aiScore+=2;
    }
    let streakScore=0;
    const logCol=propToLogCol(b.metric);
    const sk=`${nl}|${logCol}`;
    const streak=streakMap.get(sk);
    if(streak){
      if(streak.streak>=7)streakScore=3;
      else if(streak.streak>=5)streakScore=2;
      else if(streak.streak>=3)streakScore=1;
    }
    const reliabilityScore=Math.min(b.total/10,2);
    const hrScore=b.hitRate>=0.8?2:b.hitRate>=0.65?1:0;

    const conviction=evScore+aiScore+streakScore+reliabilityScore+hrScore;

    let signals=[];
    if(aiPick){const c=(aiPick.confidence||"").toUpperCase();signals.push(c==="SMASH"?"🤖 SMASH":c==="STRONG"?"🤖 STRONG":"🤖 AI")}
    if(streak)signals.push(`🔥 ${streak.streak}G streak`);
    if(b.edge>=0.15)signals.push("💎 Elite EV");
    else if(b.edge>=0.08)signals.push("📈 Strong EV");
    if(b.hitRate>=0.8)signals.push(`✅ ${(b.hitRate*100).toFixed(0)}% hit`);

    legs.push({...b,conviction,evScore,aiScore,streakScore,reliabilityScore,hrScore,signals,hasAI:!!aiPick,hasStreak:!!streak});
  }
  legs.sort((a,b)=>b.conviction-a.conviction);
  return legs;
}

function generateSlips(legs,legCount){
  if(legs.length<legCount)return[];
  const slips=[];
  const maxIter=legCount<=3?500:300;

  function gen(start,current,usedPlayers,teamCounts){
    if(current.length===legCount){
      const score=current.reduce((s,l)=>s+l.conviction,0);
      const avgEdge=current.reduce((s,l)=>s+l.edge,0)/legCount;
      const avgHitRate=current.reduce((s,l)=>s+l.hitRate,0)/legCount;
      const teams=[...new Set(current.map(l=>l.team))];
      const signals=current.reduce((s,l)=>s+l.signals.length,0);
      slips.push({legs:current.slice(),score,avgEdge,avgHitRate,teams,signalCount:signals,legCount});
      return;
    }
    for(let i=start;i<legs.length&&slips.length<maxIter;i++){
      const leg=legs[i];
      if(usedPlayers.has(leg.name.toLowerCase()))continue;
      const tc=teamCounts.get(leg.team)||0;
      if(tc>=2)continue;

      usedPlayers.add(leg.name.toLowerCase());
      teamCounts.set(leg.team,(tc||0)+1);
      current.push(leg);
      gen(i+1,current,usedPlayers,teamCounts);
      current.pop();
      usedPlayers.delete(leg.name.toLowerCase());
      teamCounts.set(leg.team,tc);
    }
  }
  const pool=legs.slice(0,legCount<=3?15:legCount<=4?18:20);
  gen(0,[],new Set(),new Map());
  slips.sort((a,b)=>b.score-a.score);
  return slips.slice(0,8);
}

function getSmartSlips(){
  const legs=getConvictionLegs();
  if(!legs.length)return{legs:[],slips3:[],slips4:[],slips5:[]};
  return{
    legs,
    slips3:generateSlips(legs,3),
    slips4:generateSlips(legs,4),
    slips5:generateSlips(legs,5)
  };
}

function getStreaks(){
  const streaks=[];
  const BAT=[{key:"H",threshold:1,label:"Hit Streak",emoji:"🔥",desc:"games w/ a hit"},{key:"HR",threshold:1,label:"HR Streak",emoji:"💣",desc:"games w/ a HR"},{key:"H",threshold:2,label:"Multi-Hit",emoji:"🔥🔥",desc:"games w/ 2+ hits"},{key:"RBI",threshold:1,label:"RBI Streak",emoji:"💰",desc:"games w/ an RBI"},{key:"TB",threshold:3,label:"Power Surge",emoji:"⚡",desc:"games w/ 3+ TB"},{key:"R",threshold:1,label:"Runs Streak",emoji:"🏃",desc:"games scoring a run"},{key:"SB",threshold:1,label:"SB Streak",emoji:"💨",desc:"games w/ a steal"}];
  const tonightNames=new Set(st.tonight.map(p=>p.player_name).filter(Boolean));
  for(const sType of BAT){for(const name of tonightNames){
    const logs=st.gameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<3)continue;let streak=0;
    for(const g of logs){if(toNum(g[sType.key])>=sType.threshold)streak++;else break}
    if(streak<3)continue;
    const pT=st.tonight.find(t=>t.player_name===name)||{};
    const recentVals=logs.slice(0,7).map(g=>toNum(g[sType.key]));
    const avgDuring=(logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sType.key]),0)/streak)||0;
    const seasAvg=toNum(logs[0][`Seas_${sType.key}`]);
    const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC===sType.key);
    streaks.push({player:name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",pitcher:pT.opp_pitcher_name||"TBD",hand:pT.opp_pitcher_hand||"?",venue:pT.venue_tonight||"",stat:sType.key,threshold:sType.threshold,streak,label:sType.label,emoji:sType.emoji,propType:"bat",desc:sType.desc,avgDuring:avgDuring.toFixed(2),seasAvg:seasAvg.toFixed(2),recentVals,dkLine:prop?prop.DK_LINE:null,overOdds:prop?parseInt(prop.OVER_ODDS)||null:null});
  }}
  const PITCH=[{key:"SO",threshold:6,label:"K Streak",emoji:"🔥",desc:"starts w/ 6+ K"},{key:"SO",threshold:8,label:"Elite K",emoji:"⚡",desc:"starts w/ 8+ K"},{key:"ER",threshold:2,label:"Lockdown",emoji:"🔒",compare:"lte",desc:"starts w/ ≤2 ER"},{key:"W",threshold:1,label:"Win Streak",emoji:"👑",desc:"consecutive wins"}];
  const pNames=new Set(st.pTonight.map(p=>p.player_name).filter(Boolean));
  for(const sType of PITCH){for(const name of pNames){
    const logs=st.pGameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<2)continue;let streak=0;const isLte=sType.compare==="lte";
    for(const g of logs){const v=toNum(g[sType.key]);if(isLte?v<=sType.threshold:v>=sType.threshold)streak++;else break}
    if(streak<2)continue;
    const pT=st.pTonight.find(t=>t.player_name===name)||{};
    const recentVals=logs.slice(0,7).map(g=>toNum(g[sType.key]));
    const avgDuring=(logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sType.key]),0)/streak)||0;
    const seasAvg=toNum(logs[0][`Seas_${sType.key}`])||toNum(logs[0][`L7_${sType.key}`]);
    const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC===sType.key);
    streaks.push({player:name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",pitcher:"",hand:"",venue:pT.venue_tonight||"",stat:sType.key,threshold:sType.threshold,streak,label:sType.label,emoji:sType.emoji,propType:"pitch",desc:sType.desc,isLte,avgDuring:avgDuring.toFixed(2),seasAvg:seasAvg.toFixed(2),recentVals,dkLine:prop?prop.DK_LINE:null,overOdds:prop?parseInt(prop.OVER_ODDS)||null:null});
  }}
  const best={};for(const s of streaks){const k=`${s.player}|${s.stat}`;if(!best[k]||s.streak>best[k].streak||(s.streak===best[k].streak&&s.threshold>best[k].threshold))best[k]=s}
  const result=Object.values(best);result.sort((a,b)=>b.streak-a.streak);
  return result;
}

// ═══ THEY'RE DUE ENGINE ═══
function getDueBoard(){
  const due=[];
  // --- BATTERS ---
  const batStats=["H","HR","RBI","R","TB","SB","BB"];
  const tonightNames=new Set(st.tonight.map(p=>p.player_name).filter(Boolean));
  for(const name of tonightNames){
    const logs=st.gameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<7)continue; // need enough data
    const pT=st.tonight.find(t=>t.player_name===name)||{};
    const most=logs[0]||{};

    for(const stat of batStats){
      const seasAvg=toNum(most[`Seas_${stat}`]);
      const l7Avg=toNum(most[`L7_${stat}`]);
      if(seasAvg<=0)continue;

      // Cold gap: how far below season average is L7?
      const coldGap=(seasAvg-l7Avg)/seasAvg;
      if(coldGap<0.25)continue; // need at least 25% below season avg

      // Drought: consecutive games below season avg for this stat
      let drought=0;
      for(const g of logs){
        if(toNum(g[stat])<seasAvg)drought++;
        else break;
      }
      if(drought<2)continue;

      // Matchup score
      let matchupScore=0;
      let matchupTags=[];
      // Handedness split advantage
      const hand=pT.opp_pitcher_hand||"R";
      const vsAvg=toNum(pT.vs_OPP_AVG);
      const vsOps=toNum(pT.vs_OPP_OPS);
      if(vsAvg>=0.280){matchupScore+=3;matchupTags.push(`vs ${hand}HP: ${vsAvg.toFixed(3)}`)}
      else if(vsAvg>=0.250){matchupScore+=1.5;matchupTags.push(`vs ${hand}HP: ${vsAvg.toFixed(3)}`)}
      if(vsOps>=0.850)matchupScore+=2;
      else if(vsOps>=0.750)matchupScore+=1;

      // Opposing pitcher quality (check if starter is in our pitcher logs)
      const oppPitcher=pT.opp_pitcher_name||"";
      if(oppPitcher&&oppPitcher!=="TBD"){
        const pLogs=st.pGameLogs.filter(g=>g.player_name===oppPitcher).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
        if(pLogs.length>0){
          const pMost=pLogs[0];
          const era=toNum(pMost.Seas_ERA);
          const whip=toNum(pMost.Seas_WHIP);
          if(era>=4.50){matchupScore+=3;matchupTags.push(`vs ${oppPitcher} (${era.toFixed(2)} ERA)`)}
          else if(era>=4.00){matchupScore+=1.5;matchupTags.push(`vs ${oppPitcher} (${era.toFixed(2)} ERA)`)}
          if(whip>=1.40)matchupScore+=1.5;
          else if(whip>=1.25)matchupScore+=0.5;
        }
      }

      // Venue boost (Coors)
      const venue=pT.venue_tonight||"";
      if(venue.includes("Coors")){matchupScore+=2;matchupTags.push("🏔️ Coors")}

      // DK prop overlay
      const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC===stat);
      let propTag=null;
      if(prop){propTag={line:prop.DK_LINE,overOdds:parseInt(prop.OVER_ODDS)||null}}

      // Total score: cold gap importance + drought length + matchup quality
      const coldScore=coldGap*15; // 0-15 range (25%-100% below)
      const droughtScore=Math.min(drought*1.5,10);
      const totalScore=coldScore+droughtScore+matchupScore;

      if(totalScore<5)continue; // minimum threshold

      const recentVals=logs.slice(0,7).map(g=>toNum(g[stat]));

      due.push({
        name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",
        pitcher:pT.opp_pitcher_name||"TBD",hand:pT.opp_pitcher_hand||"?",
        venue,stat,type:"bat",
        seasAvg:seasAvg.toFixed(2),l7Avg:l7Avg.toFixed(2),
        coldGap:(coldGap*100).toFixed(0),
        drought,matchupScore,matchupTags,
        propTag,recentVals,totalScore
      });
    }
  }

  // --- PITCHERS ---
  const pNames=new Set(st.pTonight.map(p=>p.player_name).filter(Boolean));
  for(const name of pNames){
    const logs=st.pGameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<3)continue;
    const pT=st.pTonight.find(t=>t.player_name===name)||{};
    const most=logs[0]||{};

    // Pitcher "due" — strikeout pitcher in a slump, ace with bad recent ERA
    const pStats=[
      {key:"SO",label:"Strikeouts",higher:true},
      {key:"DK_FP",label:"Fantasy Pts",higher:true},
      {key:"UD_FP",label:"UD Fantasy",higher:true},
    ];

    for(const ps of pStats){
      const seasAvg=toNum(most[`Seas_${ps.key}`]);
      const l3Avg=toNum(most[`L3_${ps.key}`]);
      if(seasAvg<=0)continue;

      const coldGap=(seasAvg-l3Avg)/seasAvg;
      if(coldGap<0.20)continue;

      let drought=0;
      for(const g of logs){
        if(toNum(g[ps.key])<seasAvg)drought++;
        else break;
      }
      if(drought<2)continue;

      // Matchup: opposing team's batting quality (use schedule to find opp)
      let matchupScore=0;
      let matchupTags=[];
      const oppAbbr=pT.opp_abbr_tonight||"";

      // Check opponent team batting average from tonight's batters
      if(oppAbbr){
        const oppBatters=st.tonight.filter(b=>b.team_abbr===oppAbbr);
        if(oppBatters.length>0){
          const teamSeasAvg=oppBatters.reduce((s,b)=>s+toNum(b.Seas_H),0)/oppBatters.length;
          if(teamSeasAvg<0.8){matchupScore+=3;matchupTags.push(`vs weak ${oppAbbr} lineup`)}
          else if(teamSeasAvg<1.0){matchupScore+=1.5;matchupTags.push(`vs avg ${oppAbbr} lineup`)}
        }
      }

      // Home/away advantage
      const ha=pT.home_away_tonight||"";
      if(ha==="Home"){matchupScore+=1;matchupTags.push("🏠 Home")}

      const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC==="P_SO");
      let propTag=null;
      if(prop){propTag={line:prop.DK_LINE,overOdds:parseInt(prop.OVER_ODDS)||null}}

      const coldScore=coldGap*15;
      const droughtScore=Math.min(drought*2,10);
      const totalScore=coldScore+droughtScore+matchupScore;

      if(totalScore<4)continue;

      const recentVals=logs.slice(0,7).map(g=>toNum(g[ps.key]));

      due.push({
        name,team:pT.team_abbr||"",opp:oppAbbr,
        pitcher:"",hand:"",
        venue:pT.venue_tonight||"",stat:ps.key,type:"pitch",
        seasAvg:seasAvg.toFixed(2),l7Avg:l3Avg.toFixed(2),
        coldGap:(coldGap*100).toFixed(0),
        drought,matchupScore,matchupTags,
        propTag,recentVals,totalScore
      });
    }
  }

  // Deduplicate: keep best stat per player
  const best={};
  for(const d of due){
    const k=d.name;
    if(!best[k]||d.totalScore>best[k].totalScore)best[k]=d;
  }
  const result=Object.values(best);
  result.sort((a,b)=>b.totalScore-a.totalScore);
  return result;
}

function dueMiniChart(vals,seasAvg){
  const mx=Math.max(...vals,seasAvg+1);
  return vals.slice().reverse().map(v=>{
    const h=Math.max(3,(v/mx)*26);
    return`<div class="due-chart-bar" style="height:${h}px;background:${v>=seasAvg?'#22c55e':'#38bdf8'};opacity:.85"></div>`;
  }).join("");
}

// ═══ DRAFT CHEAT SHEET ═══
function getDraftBoard(){
  const board=[];
  const aiMap=new Map();
  st.picks.forEach(p=>{if(p.player)aiMap.set(p.player.toLowerCase(),p)});
  for(const p of st.tonight){
    const name=p.player_name;if(!name)continue;
    const logs=st.gameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(!logs.length)continue;const most=logs[0]||{};
    const sH=toNum(most.Seas_H),sHR=toNum(most.Seas_HR),s2B=toNum(most.Seas_2B);
    const sTB=toNum(most.Seas_TB),sRBI=toNum(most.Seas_RBI),sR=toNum(most.Seas_R);
    const sSB=toNum(most.Seas_SB),sBB=toNum(most.Seas_BB);
    const s3B=Math.max(0,(sTB-sH-s2B-3*sHR)/2)||0;
    const s1B=Math.max(0,sH-s2B-s3B-sHR)||0;
    const projUD=toNum(most.Seas_UD_FP)||(s1B*3+s2B*6+s3B*8+sHR*10+sBB*3+sRBI*2+sR*2+sSB*4)||0;
    const l7H=toNum(most.L7_H),l7HR=toNum(most.L7_HR),l72B=toNum(most.L7_2B);
    const l7TB=toNum(most.L7_TB),l7RBI=toNum(most.L7_RBI),l7R=toNum(most.L7_R);
    const l7SB=toNum(most.L7_SB),l7BB=toNum(most.L7_BB);
    const l73B=Math.max(0,(l7TB-l7H-l72B-3*l7HR)/2)||0;
    const l71B=Math.max(0,l7H-l72B-l73B-l7HR)||0;
    const l7UD=toNum(most.L7_UD_FP)||(l71B*3+l72B*6+l73B*8+l7HR*10+l7BB*3+l7RBI*2+l7R*2+l7SB*4)||0;
    const ai=aiMap.get(name.toLowerCase()),isSmash=ai&&(ai.confidence||"").toUpperCase()==="SMASH";
    let pos="FLEX";const posRaw=(p.position||"").toUpperCase();
    if(posRaw.includes("C")||posRaw.includes("1B")||posRaw.includes("2B")||posRaw.includes("3B")||posRaw.includes("SS"))pos="IF";
    else if(posRaw.includes("OF")||posRaw.includes("LF")||posRaw.includes("CF")||posRaw.includes("RF"))pos="OF";
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:p.opp_pitcher_name||"TBD",hand:p.opp_pitcher_hand||"?",projUD:projUD.toFixed(1),l7UD:l7UD.toFixed(1),sH,sHR,sRBI,sR,sSB,sBB,isSmash,isPitcher:false,pos});
  }
  for(const p of st.pTonight){
    const name=p.player_name;if(!name)continue;
    const logs=st.pGameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(!logs.length)continue;const most=logs[0]||{};
    const sSO=toNum(most.Seas_SO),sER=toNum(most.Seas_ER),sW=toNum(most.Seas_W),sIP=toNum(most.Seas_IP);
    const qsRate=logs.length>0?logs.filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length/logs.length:0;
    const projUD=toNum(most.Seas_UD_FP)||(sW*2+qsRate*3+sSO+sIP+sER*-1)||0;
    const l3SO=toNum(most.L3_SO),l3ER=toNum(most.L3_ER),l3W=toNum(most.L3_W),l3IP=toNum(most.L3_IP);
    const l3QS=logs.slice(0,3).filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length/Math.min(3,logs.length);
    const l7UD=toNum(most.L7_UD_FP)||(l3W*2+l3QS*3+l3SO+l3IP+l3ER*-1)||0;
    const ai=aiMap.get(name.toLowerCase()),isSmash=ai&&(ai.confidence||"").toUpperCase()==="SMASH";
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:"",hand:"",projUD:projUD.toFixed(1),l7UD:l7UD.toFixed(1),sSO,sER,sW,sIP,qsRate,isSmash,isPitcher:true,pos:"P"});
  }
  board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));
  return board;
}

      <div class="sub-tab ${st.picksView==="bets"?"active":""}" onclick="switchPicksView('bets')">💰 Best Bets</div>
      <div class="sub-tab ${st.picksView==="slips"?"active":""}" onclick="switchPicksView('slips')">🎫 Slips</div>
      <div class="sub-tab ${st.picksView==="picks"?"active":""}" onclick="switchPicksView('picks')">🤖 AI Picks</div>
      <div class="sub-tab ${st.picksView==="draft"?"active":""}" onclick="switchPicksView('draft')">⚾ Draft</div>
      <div class="sub-tab ${st.picksView==="streaks"?"active":""}" onclick="switchPicksView('streaks')">🔥 Streaks</div>
      <div class="sub-tab ${st.picksView==="due"?"active":""}" onclick="switchPicksView('due')">🧊 Due</div>
      <div class="sub-tab ${st.picksView==="dingers"?"active":""}" onclick="switchPicksView('dingers')">💣 Dingers</div>
      <div class="sub-tab ${st.picksView==="props"?"active":""}" onclick="switchPicksView('props')">🎲 Props</div>
    </div>
    <div class="cards-wrap">${picksHTML}</div>
    <div class="timestamp">Data from MLB Dashboard Engine · DraftKings via The Odds API</div>
  </div>

  <div id="pg-lookup" class="page ${activeTab==="lookup"?"active":""}">
    ${lk?`<div class="profile"><div class="profile-img"><img src="${lk.img}" onerror="this.style.display='none'"/></div><div class="profile-info"><h2>${lk.name}</h2><p>${lk.team} · ${lk.pos} · #${lk.number} · B:${lk.bats} T:${lk.throws}</p></div></div>${lkSum}<div class="sub-tabs"><div class="sub-tab ${st.lkSubTab==="career"?"active":""}" onclick="switchLkSub('career')">Career</div><div class="sub-tab ${st.lkSubTab==="vsTeam"?"active":""}" onclick="switchLkSub('vsTeam')">vs Team</div><div class="sub-tab ${st.lkSubTab==="vsPlayer"?"active":""}" onclick="switchLkSub('vsPlayer')">vs Player</div></div>${lkBody}`:`<div class="empty" style="padding:60px 20px;font-size:14px">Search for any active MLB player to see career stats, team matchups, and head-to-head data.</div>`}
    <div class="timestamp">Data from MLB Stats API · Live</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn ${activeTab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">📊 Dash</button>
    <button class="tab-btn ${activeTab==="gamelog"?"active":""}" onclick="switchTab('gamelog')">📋 Log</button>
    <button class="tab-btn ${activeTab==="picks"?"active":""}" onclick="switchTab('picks')">🎯 Picks</button>
    <button class="tab-btn ${activeTab==="lookup"?"active":""}" onclick="switchTab('lookup')">🔍 Lookup</button>
  </div>`;

  const ms=document.getElementById("metricSel");if(ms)ms.onchange=e=>{st.metric=e.target.value;render()};
  const li=document.getElementById("lineInput");if(li)li.onchange=e=>{st.line=e.target.value;render()};
  const of=document.getElementById("oppFilter");if(of)of.onchange=e=>{st.oppFilter=e.target.value;render()};
  const lkS=document.getElementById("lkSearch");if(lkS)lkS.oninput=e=>{clearTimeout(window._lkT);window._lkT=setTimeout(()=>searchLkPlayers(e.target.value),300)};
  const vts=document.getElementById("vsTeamSel");if(vts)vts.onchange=e=>{st.lkVsTeamId=e.target.value?parseInt(e.target.value):null;fetchLkVsTeam(st.lkPlayer.id,st.lkVsTeamId)};
  const vpi=document.getElementById("vsPlayerInput");if(vpi)vpi.oninput=e=>{clearTimeout(window._vpT);window._vpT=setTimeout(()=>searchVsP(e.target.value),300)};
  const psi=document.getElementById("propsSearchInput");if(psi)psi.oninput=e=>{st.propsSearch=e.target.value;render()};
  restoreFocus(focus);
}

async function searchLkPlayers(q){
  if(q.length<2){st.lkResults=[];render();return}
  try{const d=await mlbFetch(`${MLB_API}/people/search?names=${encodeURIComponent(q)}&sportId=1&hydrate=currentTeam&limit=10`);st.lkResults=(d.people||[]).filter(p=>p.active).map(p=>({id:p.id,name:p.fullName,team:p.currentTeam?.abbreviation||"",pos:p.primaryPosition?.abbreviation||"",number:p.primaryNumber||"",bats:p.batSide?.code||"",throws:p.pitchHand?.code||"",img:`https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_120,q_auto:best/v1/people/${p.id}/headshot/67/current`}));render()}catch(e){console.error(e)}
}
function pickLkPlayer(i){
  const p=st.lkResults[i];st.lkPlayer=p;st.lkResults=[];st.lkSubTab="career";
  st.lkCareer=null;st.lkYby=null;st.lkVsTeamStats=null;st.lkVsPlayerStats=null;st.lkVsPlayerId=null;st.lkVsPlayerName="";st.lkVsTeamId=null;
  st.lkPlayerType=["P","TWP"].includes(p.pos)?"pitcher":"batter";
  const isP=["P","TWP"].includes(p.pos);
  const src=isP?st.pTonight:st.tonight;
  const match=src.find(t=>(t.player_name||"").toLowerCase()===p.name.toLowerCase());
  if(match){st.player=match.player_name;if(isP&&st.mode!=="pitcher"){st.mode="pitcher";st.metric="SO"}if(!isP&&st.mode!=="batter"){st.mode="batter";st.metric="H"}}
  render();fetchLkCareer(p.id);
}
async function fetchLkCareer(id){
  st.lkLoading.career=true;render();
  try{const g=st.lkPlayerType==="pitcher"?"pitching":"hitting";const[cr,yby]=await Promise.all([mlbFetch(`${MLB_API}/people/${id}/stats?stats=career&group=${g}`),mlbFetch(`${MLB_API}/people/${id}/stats?stats=yearByYear&group=${g}&sportId=1`)]);st.lkCareer=(cr.stats||[])[0]?.splits?.[0]?.stat||null;st.lkYby=((yby.stats||[])[0]?.splits||[]).filter(s=>s.sport?.id===1).map(s=>({season:s.season,team:s.team?.abbreviation||"",stat:s.stat}))}catch(e){console.error(e)}
  st.lkLoading.career=false;render();
}
async function fetchLkVsTeam(id,teamId){
  st.lkLoading.vsTeam=true;render();
  try{
    const g=st.lkPlayerType==="pitcher"?"pitching":"hitting";
    if(teamId){const d=await mlbFetch(`${MLB_API}/people/${id}/stats?stats=vsTeam&group=${g}&opposingTeamId=${teamId}&sportId=1`);const sp=(d.stats||[])[0]?.splits||[];const tm=st.lkTeamList.find(t=>t.id===teamId);st.lkVsTeamStats=sp.length?[{teamId,team:tm?.abbr||"",stat:sp.length===1?sp[0].stat:combSplits(sp)}]:[]}
    else{const results=[];for(let i=0;i<st.lkTeamList.length;i+=10){const batch=st.lkTeamList.slice(i,i+10);const pr=batch.map(async tm=>{try{const d=await mlbFetch(`${MLB_API}/people/${id}/stats?stats=vsTeam&group=${g}&opposingTeamId=${tm.id}&sportId=1`);const sp=(d.stats||[])[0]?.splits||[];if(sp.length)return{teamId:tm.id,team:tm.abbr,stat:sp.length===1?sp[0].stat:combSplits(sp)}}catch(e){}return null});results.push(...(await Promise.all(pr)).filter(Boolean));if(i+10<st.lkTeamList.length)await new Promise(r=>setTimeout(r,500))}st.lkVsTeamStats=results}
    st.lkVsTeamStats.sort((a,b)=>(parseInt(b.stat?.gamesPlayed)||0)-(parseInt(a.stat?.gamesPlayed)||0));
  }catch(e){console.error(e);st.lkVsTeamStats=[]}
  st.lkLoading.vsTeam=false;render();
}
function combSplits(splits){
  const t={};const keys=["gamesPlayed","atBats","hits","doubles","triples","homeRuns","rbi","runs","stolenBases","baseOnBalls","strikeOuts","totalBases","plateAppearances","hitByPitch","sacFlies","wins","losses","gamesStarted","inningsPitched"];
  const stats=splits.map(s=>s.stat);for(const k of keys){const s=stats.reduce((a,s)=>a+(parseFloat(s[k])||0),0);if(s>0)t[k]=s}
  if(t.atBats>0){t.avg=(t.hits/t.atBats).toFixed(3);t.slg=((t.totalBases||0)/t.atBats).toFixed(3)}
  const pa=t.plateAppearances||(t.atBats+(t.baseOnBalls||0)+(t.hitByPitch||0)+(t.sacFlies||0));
  if(pa>0){t.obp=((t.hits+(t.baseOnBalls||0)+(t.hitByPitch||0))/pa).toFixed(3);t.ops=(parseFloat(t.obp||0)+parseFloat(t.slg||0)).toFixed(3)}
  return t;
}
async function searchVsP(q){if(q.length<2){st.lkVsPlayerResults=[];render();return}try{const d=await mlbFetch(`${MLB_API}/people/search?names=${encodeURIComponent(q)}&sportId=1&limit=8`);st.lkVsPlayerResults=(d.people||[]).map(p=>({id:p.id,name:p.fullName,pos:p.primaryPosition?.abbreviation||"",team:p.currentTeam?.abbreviation||""}));render()}catch(e){console.error(e)}}
function pickVsP(id,name){st.lkVsPlayerId=id;st.lkVsPlayerName=name;st.lkVsPlayerResults=[];fetchLkVsPlayer(st.lkPlayer.id,id)}
async function fetchLkVsPlayer(pid,oid){st.lkLoading.vsPlayer=true;st.lkVsPlayerResults=[];render();try{const g=st.lkPlayerType==="pitcher"?"pitching":"hitting";const d=await mlbFetch(`${MLB_API}/people/${pid}/stats?stats=vsPlayer&group=${g}&opposingPlayerId=${oid}`);const sp=(d.stats||[])[0]?.splits||[];st.lkVsPlayerStats=sp.length?sp[0].stat:null}catch(e){st.lkVsPlayerStats=null}st.lkLoading.vsPlayer=false;render()}
function switchLkSub(t){st.lkSubTab=t;if(t==="vsTeam")st.lkVsTeamStats=null;render()}

async function loadTeams(){const yr=new Date().getMonth()>=3?new Date().getFullYear():new Date().getFullYear()-1;try{const d=await mlbFetch(`${MLB_API}/teams?sportId=1&season=${yr}`);st.lkTeamList=(d.teams||[]).map(t=>({id:t.id,name:t.name,abbr:t.abbreviation}))}catch(e){}}

Promise.all([
  loadTeams(),
  fetchSheet("Tonights_Batters"),
  fetchSheet("Batter_Game_Logs"),
  fetchSheet("Home_Away_Splits").catch(()=>[]),
  fetchSheet("Venue_Weather").catch(()=>[]),
  fetchSheet("Tonights_Pitchers").catch(()=>[]),
  fetchSheet("Tonights_Schedule").catch(()=>[]),
  fetchSheet("Tonights_Starters").catch(()=>[]),
  fetchSheet("Pitcher_Game_Logs").catch(()=>[]),
  fetchSheet("Pitcher_Home_Away").catch(()=>[]),
  fetchSheet("Daily_Picks").catch(()=>[]),
  fetchSheet("DK_Player_Props").catch(()=>[])
]).then(([_,tonight,logs,splits,weather,pitchers,schedule,pTonight,pLogs,pSplits,picks,props])=>{
  st.tonight=normalizeKeys(cleanRows(tonight));
  st.gameLogs=normalizeKeys(cleanRows(logs));
  st.splits=normalizeKeys(cleanRows(splits));
  st.weather=normalizeKeys(cleanRows(weather));
  st.pitchers=normalizeKeys(cleanRows(pitchers));
  st.schedule=normalizeKeys(cleanRows(schedule));
  st.pTonight=normalizeKeys(cleanRows(pTonight));
  st.pGameLogs=normalizeKeys(cleanRows(pLogs));
  st.pSplits=normalizeKeys(cleanRows(pSplits));
  st.picks=normalizeKeys(cleanRows(picks));
  st.props=normalizeKeys(cleanRows(props));
  st.loading=false;

  st.mode="batter";st.metric="H";
  st.player=firstValidPlayer(st.tonight);

  if(!st.player&&st.pTonight.length>0){
    st.mode="pitcher";st.metric="SO";
    st.player=firstValidPlayer(st.pTonight);
  }

  console.log(`🚀 Dashboard loaded — mode:${st.mode}, player:"${st.player}"`);
  console.log(`   Batters: ${st.tonight.length}, Logs: ${st.gameLogs.length}, Pitchers: ${st.pTonight.length}`);
  console.log(`   Props: ${st.props.length}, Picks: ${st.picks.length}, Weather: ${st.weather.length}`);
  if(st.tonight.length>0)console.log(`   Batter row 0 keys:`,Object.keys(st.tonight[0]).slice(0,8));
  if(st.pTonight.length>0)console.log(`   Pitcher row 0 keys:`,Object.keys(st.pTonight[0]).slice(0,8));
  if(!st.player)console.error(`❌ NO DEFAULT PLAYER FOUND. Batter row 0:`,JSON.stringify(st.tonight[0]).slice(0,200));
  render();
}).catch(err=>{
  console.error("❌ Load failed:",err);
  st.loading=false;
  st.error="Could not load data. Make sure your Google Sheet is set to 'Anyone with the link can view'.";
  render();
});
</script>
