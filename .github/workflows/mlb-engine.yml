name: MLB Engine

on:
  workflow_dispatch:
  schedule:
    # REDUCED FROM 5x/day to 3x/day on 2026-05-27 for end-of-month quota.
    # Revisit after 6/1 reset — restore the 14:00 and 20:00 runs if quota allows.
    - cron: "45 5 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"

jobs:
  run-mlb-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      ENABLE_FANDUEL_FALLBACK: "true"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests pytz gspread google-auth google-genai gspread-dataframe pybaseball

      - name: Run MLB engine
        run: python MLBEnginev5-4.py
