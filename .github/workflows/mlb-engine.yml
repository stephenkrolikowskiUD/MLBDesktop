name: MLB Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"

jobs:
  run-mlb-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests pytz gspread google-auth google-genai

      - name: Run MLB engine
        run: |
          python - <<'PY'
          from pathlib import Path
          src = Path("MLBEnginev5-4.py")
          text = src.read_text()
          lines = [line for line in text.splitlines() if not line.lstrip().startswith('!pip ')]
          Path("/tmp/MLBEnginev5-4.run.py").write_text("\n".join(lines) + "\n")
          PY
          python /tmp/MLBEnginev5-4.run.py
