name: MLB Grader

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-mlb-grader:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests pytz gspread google-auth

      - name: Run MLB grader
        run: python MLBGrader5-4.py
